<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIAMOND TRANSACTION CORE - CYBER MATRIX v2.0</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0B132B; color: #FFFFFF; padding: 20px; }
        
        /* Top Global Vault Header */
        .header { background-color: #1C2541; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-radius: 6px; margin-bottom: 20px; }
        .header h1 { font-family: 'Consolas', monospace; font-size: 22px; color: #4EA8DE; }
        .vault-balances { display: flex; gap: 20px; font-family: 'Consolas', monospace; font-size: 14px; font-weight: bold; }
        .bal-inr { color: #52B788; }
        .bal-usd { color: #4EA8DE; }

        /* Main Grid container */
        .main-container { display: grid; grid-template-columns: 1.3fr 1fr; gap: 20px; min-height: 580px; }
        
        /* Left Entry Panel */
        .left-panel { background-color: #111D4A; border: 2px solid #1C2541; border-radius: 6px; padding: 20px; display: flex; flex-direction: column; justify-content: space-between; }
        .mode-buttons { display: flex; gap: 10px; margin-bottom: 25px; }
        .mode-btn { padding: 10px 25px; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; color: white; background-color: #1C2541; }
        .mode-btn.active-debit { background-color: #E63946; }
        .mode-btn.active-credit { background-color: #52B788; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px 30px; }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        .form-group label { color: #4EA8DE; font-size: 13px; font-weight: bold; }
        .form-group input, .form-group select { background-color: #1C2541; border: 1px solid #3A506B; padding: 10px; color: white; border-radius: 4px; font-size: 14px; outline: none; }
        .amt-curr-group { display: flex; gap: 8px; }
        .amt-curr-group input { flex: 2; }
        .amt-curr-group select { flex: 1; }

        .post-btn { width: 100%; padding: 15px; border: none; font-size: 15px; font-weight: bold; color: white; cursor: pointer; border-radius: 4px; margin-top: 30px; transition: 0.2s; }
        .post-btn.debit-style { background-color: #E63946; }
        .post-btn.credit-style { background-color: #52B788; }

        /* Right Database Panel */
        .right-panel { background-color: #1C2541; border: 2px solid #3A506B; border-radius: 6px; padding: 20px; display: flex; flex-direction: column; }
        .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #3A506B; padding-bottom: 10px; }
        .nav-left { color: #888888; font-size: 12px; font-weight: bold; }
        .nav-right { color: #4EA8DE; font-size: 13px; font-weight: bold; text-decoration: underline; cursor: pointer; }
        .panel-title { font-size: 15px; font-weight: bold; margin-bottom: 10px; color: #FFFFFF; }
        
        .review-box { flex: 1; background-color: #0B132B; border: 1px solid #3A506B; border-radius: 4px; font-family: 'Consolas', monospace; font-size: 13px; padding: 15px; overflow-y: auto; white-space: pre-wrap; color: #52B788; line-height: 1.5; }
    </style>
</head>
<body>

    <!-- Header Block -->
    <div class="header">
        <h1>TRANSACTION MATRIX CORE</h1>
        <div class="vault-balances">
            <span class="bal-inr">GLOBAL VAULT (INR): ₹ 48,50,000</span>
            <span class="bal-usd">GLOBAL VAULT (USD): $ 25,400</span>
        </div>
    </div>

    <!-- Main Workspace -->
    <div class="main-container">
        
        <!-- Left Data Input Form -->
        <div class="left-panel">
            <div>
                <div class="mode-buttons">
                    <button type="button" class="mode-btn" id="creditBtn" onclick="switchMode('CREDIT')">CREDIT</button>
                    <button type="button" class="mode-btn active-debit" id="debitBtn" onclick="switchMode('DEBIT')">DEBIT</button>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label>SELECT MATRIX BANK:</label>
                        <select id="bankSelect">
                            <option value="Current">Kotak Mahindra Bank (7587)</option>
                            <option value="CC">State Bank of India (1102)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>TRANSACTION PURPOSE:</label>
                        <select id="purposeSelect">
                            <!-- Populated dynamically via JS -->
                        </select>
                    </div>

                    <div class="form-group">
                        <label>TRANSACTION METHOD:</label>
                        <select id="methodSelect">
                            <option>ONLINE / IMPS</option>
                            <option>RTGS / NEFT</option>
                            <option>CASH / ANGADIA REPO</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>VALUE AMOUNT & CURRENCY:</label>
                        <div class="amt-curr-group">
                            <input type="text" id="amountInput" value="0.00">
                            <select id="currSelect">
                                <option>INR</option>
                                <option>USD</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>PARTICULAR / PARTY NAME:</label>
                        <input type="text" id="partyInput" placeholder="Enter Entity Name">
                    </div>

                    <div class="form-group">
                        <label>EXECUTION DATE:</label>
                        <input type="text" id="dateInput" value="13-07-2026">
                    </div>
                </div>
            </div>

            <button type="button" class="post-btn debit-style" id="postBtn" onclick="handlePostEntry()">POST MATRIX ENTRY (DEBIT / OUTGOING)</button>
        </div>

        <!-- Right Verification & Live View -->
        <div class="right-panel">
            <div class="top-nav">
                <div class="nav-left">BANK HIERARCHY</div>
                <div class="nav-right">LIVE DETAILS PANEL</div>
            </div>
            <div class="panel-title">LIVE ACCOUNT LEDGER DATABASE</div>
            <div class="review-box" id="reviewBox">[SYSTEM STATUS]: Active&#10;[API NODE]: Waiting for secure bank response...</div>
        </div>

    </div>

    <script>
        let currentMode = "DEBIT";

        const creditPurposes = [
            "Sales Revenue", "Bank CC / OD / Loan Disbursal", "Unsecured / Hand Loans",
            "Promoter Capital Infusion", "Rough Resale & Boart Income", 
            "Interest & Government Subsidies", "GST & Tax Refunds", "Miscellaneous Income"
        ];

        const debitPurposes = [
            "Rough Diamonds Purchase", "Brokerage & Commission", "Factory Wages & Salaries",
            "Machinery & Automation Capital", "Consumables & Factory Expenses", "Utility & Power Bills",
            "Office & Administrative Expenses", "Loan EMI & Interest Repayment", 
            "Unsecured Loan Repayment", "Statutory Taxes & GST Payments", "Partners Withdrawals / Personal"
        ];

        function updatePurposeOptions() {
            const select = document.getElementById("purposeSelect");
            select.innerHTML = "";
            const currentList = (currentMode === "CREDIT") ? creditPurposes : debitPurposes;
            
            currentList.forEach(purpose => {
                let opt = document.createElement("option");
                opt.value = purpose;
                opt.textContent = purpose;
                select.appendChild(opt);
            });
        }

        function switchMode(mode) {
            currentMode = mode;
            const creditBtn = document.getElementById("creditBtn");
            const debitBtn = document.getElementById("debitBtn");
            const postBtn = document.getElementById("postBtn");

            if (mode === "CREDIT") {
                creditBtn.className = "mode-btn active-credit";
                debitBtn.className = "mode-btn";
                postBtn.className = "post-btn credit-style";
                postBtn.textContent = "POST MATRIX ENTRY (CREDIT / INCOMING)";
            } else {
                creditBtn.className = "mode-btn";
                debitBtn.className = "mode-btn active-debit";
                postBtn.className = "post-btn debit-style";
                postBtn.textContent = "POST MATRIX ENTRY (DEBIT / OUTGOING)";
            }
            updatePurposeOptions();
        }

        function handlePostEntry() {
            const party = document.getElementById("partyInput").value.trim();
            const amount = document.getElementById("amountInput").value.trim();
            const purpose = document.getElementById("purposeSelect").value;
            const bankSelect = document.getElementById("bankSelect");
            const bankName = bankSelect.options[bankSelect.selectedIndex].text;
            const accType = bankSelect.value;
            const currency = document.getElementById("currSelect").value;

            if (!party) {
                alert("Please provide a valid Party or Entity Name.");
                return;
            }

            const colorIndicator = (currentMode === "CREDIT") ? "🟢 CREDIT" : "🔴 DEBIT";
            const symbol = (currency === "USD") ? "$" : "₹";
            const timestamp = new Date().toISOString().replace('T', ' ').substring(0, 19);

            const successLog = 
`=========================================
 TRANSACTION VERIFICATION SUCCESSFUL
=========================================
• Status: Approved & Logged
• Action: ${colorIndicator}
• Bank Node: ${bankName}
• Account Type: ${accType} Account [API Auto-Fetched]
• Entity Target: ${party}
• Purpose Category: ${purpose}
• Final Value: ${symbol} ${amount} (${currency})
• Timestamp: ${timestamp}
-----------------------------------------
[SYSTEM]: Core Vault Balance adjusted successfully.`;

            const reviewBox = document.getElementById("reviewBox");
            reviewBox.textContent = successLog;
            reviewBox.style.color = (currentMode === "CREDIT") ? "#52B788" : "#E63946";
            
            alert(`Transaction entry posted successfully under ${purpose}!`);
        }

        // Initial trigger
        updatePurposeOptions();
    </script>
</body>
</html>
