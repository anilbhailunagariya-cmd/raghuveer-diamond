<!DOCTYPE html> 
<html lang="en"> 
<head> 
<meta charset="UTF-8"> 
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"> 
<title>Raghuveer Diamond - AI Future Banking Terminal</title> 
<style> 
:root { 
    --bg-primary: #070B19; 
    --bg-secondary: rgba(17, 29, 55, 0.7); 
    --top-bar-bg: #030611; 
    --border-color: rgba(28, 37, 65, 0.9); 
    --accent-cyan: #5BC0BE; 
    --accent-blue: #00C6FF; 
    --accent-green: #27AE60; 
    --accent-red: #E74C3C; 
    --text-main: #FFFFFF; 
    --text-muted: #708090; 
} 
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; } 
body { background-color: var(--bg-primary); color: var(--text-main); width: 100vw; height: 100vh; display: flex; flex-direction: column; overflow: hidden; } 

.window-control-bar { height: 40px; background-color: var(--top-bar-bg); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; border-bottom: 1px solid var(--border-color); } 
.brand-title { font-size: 14px; font-weight: 900; letter-spacing: 1px; color: var(--accent-cyan); text-transform: uppercase; } 
.win-btn { background: none; border: none; color: var(--accent-red); font-size: 12px; cursor: pointer; } 

.balance-board { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; padding: 15px; } 
.balance-card { 
    background: var(--bg-secondary); 
    border: 2px solid var(--border-color); 
    border-radius: 12px; 
    padding: 10px; 
    aspect-ratio: 2 / 1; 
    display: flex; 
    flex-direction: column; 
    justify-content: center; 
    align-items: center; 
    cursor: pointer; 
    transition: all 0.3s;
} 
.balance-card.active { border-color: var(--accent-cyan); box-shadow: 0 0 15px rgba(91, 192, 190, 0.4); background: rgba(91, 192, 190, 0.1); }
.card-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 5px; }
.card-val { font-size: 18px; font-weight: 800; color: #FFFFFF; }

.bank-workspace { flex: 1; padding: 0 15px 15px 15px; display: grid; grid-template-columns: 1.1fr 1fr; gap: 15px; height: calc(100vh - 180px); overflow: hidden; } 
.panel-box { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 12px; padding: 15px; display: flex; flex-direction: column; } 
.panel-title { font-size: 13px; color: var(--accent-cyan); text-transform: uppercase; margin-bottom: 15px; font-weight: 700; border-bottom: 1px dashed var(--border-color); padding-bottom: 8px; } 

.form-scroll-container { display: flex; flex-direction: column; gap: 15px; overflow-y: auto; flex: 1; } 
.form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; } 
.input-group { display: flex; flex-direction: column; gap: 5px; } 
.input-group label { font-size: 11px; color: #FFFFFF; text-transform: uppercase; } 
.input-control { background: var(--bg-primary); border: 1px solid var(--border-color); color: var(--accent-cyan); padding: 10px; border-radius: 6px; font-size: 13px; outline: none; } 

.mode-btn { background: var(--accent-cyan); color: #030611; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: 800; text-transform: uppercase; text-align: center; border: none; } 

.table-wrapper { flex: 1; overflow-y: auto; border: 1px solid var(--border-color); border-radius: 6px; background: var(--bg-primary); } 
table { width: 100%; border-collapse: collapse; font-size: 12px; } 
th { background: var(--border-color); color: var(--accent-cyan); padding: 10px; text-transform: uppercase; } 
td { padding: 8px 10px; border-bottom: 1px solid var(--border-color); color: #FFFFFF; } 
</style> 
</head> 
<body onload="initializeTerminal()" onclick="makeFullScreen()"> 

<div class="window-control-bar"> 
 <div class="brand-title">RAGHUVEER DIAMOND - BANKING TERMINAL</div> 
 <button class="win-btn" onclick="backToDashboard()">✕ CLOSE</button> 
</div> 

 <div class="balance-board"> 
     <div class="balance-card" id="card-top-bank" onclick="selectMode('BANK')"><div class="card-label">BANK VAULT</div><div class="card-val" id="val-top-vault">₹ 0</div></div>
     <div class="balance-card active" id="card-top-credit" onclick="selectMode('CREDIT')"><div class="card-label">CREDIT (IN)</div><div class="card-val" id="val-top-credit">₹ 0</div></div>
     <div class="balance-card" id="card-top-debit" onclick="selectMode('DEBIT')"><div class="card-label">DEBIT (OUT)</div><div class="card-val" id="val-top-debit">₹ 0</div></div>
     <div class="balance-card" id="card-top-transfer" onclick="selectMode('TRANSFER')"><div class="card-label">TRANSFER</div><div class="card-val">PROTOCOL</div></div>
 </div> 

 <div class="bank-workspace"> 
 <div class="panel-box"> 
 <div class="panel-title" id="panel-title-text">Intelligent Transaction Core (Credit Mode)</div> 
 <div class="form-scroll-container"> 
 <div class="form-grid-2"> 
 <div class="input-group" id="src-bank-group"><label>Source Bank</label><select class="input-control" id="bank-select"></select></div> 
 <div class="input-group" id="dest-bank-group" style="display: none;"><label>Destination Bank</label><select class="input-control" id="dest-bank-select"></select></div> 
 </div> 
 <div class="form-grid-2"> 
 <div class="input-group"><label>Method</label><select class="input-control" id="method-select"><option value="ONLINE">ONLINE</option><option value="CHEQUE">CHEQUE</option></select></div> 
 <div class="input-group" id="purpose-group"><label>Purpose</label><select class="input-control" id="purpose-select"></select></div> 
 </div> 
 <div class="form-grid-2"> 
 <div class="input-group" id="party-group"><label>Party Name</label><input type="text" class="input-control" id="party-name" placeholder="Enter Name"></div> 
 <div class="input-group"><label>Amount</label><input type="number" class="input-control" id="tx-amount" placeholder="0.00"></div> 
 </div> 
 </div> 
 <button class="mode-btn" id="post-btn" onclick="executePostEntry()">POST TRANSACTION</button> 
 </div> 
 
 <div class="panel-box"> 
 <div class="panel-title">Live Account Ledger</div> 
 <div class="table-wrapper"> <table><thead><tr><th>Bank</th><th>Details</th><th>Amount</th></tr></thead><tbody id="ledger-rows"></tbody></table> </div> 
 </div> 
 </div> 

<script> 
 let currentMode = "CREDIT"; 

 function makeFullScreen() { 
     if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(err => {}); 
 }

 function selectMode(mode) { 
     currentMode = mode; 
     document.querySelectorAll('.balance-card').forEach(el => el.classList.remove('active'));
     if(mode === 'CREDIT') document.getElementById('card-top-credit').classList.add('active');
     else if(mode === 'DEBIT') document.getElementById('card-top-debit').classList.add('active');
     else if(mode === 'TRANSFER') document.getElementById('card-top-transfer').classList.add('active');
     
     // Update UI
     document.getElementById('panel-title-text').innerText = "Transaction Core (" + mode + " Mode)";
     document.getElementById('dest-bank-group').style.display = (mode === 'TRANSFER') ? 'flex' : 'none';
     document.getElementById('purpose-group').style.display = (mode === 'TRANSFER') ? 'none' : 'flex';
     document.getElementById('party-group').style.display = (mode === 'TRANSFER') ? 'none' : 'flex';
     
     if(mode === 'BANK') { /* Open Settings logic here */ openSettingsModal(); }
 }

 function initializeTerminal() { refreshBankData(); } 
 function backToDashboard() { window.location.href = 'main_office.html'; } 

 function refreshBankData() { 
     const banks = JSON.parse(localStorage.getItem('factory_banks')) || []; 
     const select = document.getElementById('bank-select'); 
     const destSelect = document.getElementById('dest-bank-select'); 
     if(banks.length > 0) {
        select.innerHTML = banks.map(b => `<option value="${b.name}">${b.name}</option>`).join('');
        destSelect.innerHTML = banks.map(b => `<option value="${b.name}">${b.name}</option>`).join('');
        let total = banks.reduce((s, b) => s + b.balance, 0);
        document.getElementById('val-top-vault').innerText = `₹ ${total.toLocaleString('en-IN')}`;
     }
 }

 function executePostEntry() { /* ...logic kept as before but cleaner... */ refreshBankData(); }
 function openSettingsModal() { /* ... */ }
</script> 
</body> 
</html>
