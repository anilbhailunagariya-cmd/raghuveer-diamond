<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Raghuveer Diamond - AI Future Banking Terminal 2050</title>
    <style>
        :root {
            --bg-primary: #0B132B;
            --bg-secondary: #111D37;
            --top-bar-bg: #070B19;
            --border-color: #1C2541;
            --accent-cyan: #5BC0BE;
            --accent-blue: #00C6FF;
            --accent-green: #27AE60;
            --accent-red: #E74C3C;
            --text-main: #FFFFFF;
            --text-muted: #708090;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* No Scrolling Layout */
        }

        /* Top Cyber Header Matrix */
        .window-control-bar {
            height: 50px;
            background-color: var(--top-bar-bg);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 0 0 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .brand-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .company-logo-frame {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: linear-gradient(45deg, #00C6FF, #0072FF);
            box-shadow: 0 0 8px #00C6FF;
        }

        .brand-title {
            font-size: 16px;
            font-weight: 900;
            letter-spacing: 1px;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-blue), #0072FF, var(--accent-cyan));
            background-size: 300% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: cyberGlow 6s linear infinite;
            text-transform: uppercase;
        }

        @keyframes cyberGlow {
            0% { background-position: 0% center; }
            100% { background-position: 300% center; }
        }

        .window-actions {
            display: flex;
            height: 100%;
        }

        .win-btn {
            background: none;
            border: none;
            color: var(--accent-cyan);
            width: 45px;
            height: 100%;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .win-btn:hover { background: var(--border-color); color: #FFFFFF; }
        .win-btn.close-btn:hover { background: var(--accent-red); color: #FFFFFF; }

        /* Main Workspace Split Grid - Auto Responsive */
        .bank-workspace {
            flex: 1;
            padding: 15px;
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 15px;
            height: calc(100vh - 90px);
        }

        @media (max-width: 900px) {
            .bank-workspace {
                grid-template-columns: 1fr;
                grid-template-rows: 1fr 1fr;
                overflow-y: auto;
            }
        }

        .panel-box {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .panel-title {
            font-size: 13px;
            color: var(--accent-cyan);
            text-transform: uppercase;
            margin-bottom: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            border-bottom: 1px dashed var(--border-color);
            padding-bottom: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Futuristic Form Interface */
        .form-scroll-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
            flex: 1;
            padding-right: 5px;
        }

        .form-grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .input-group label {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-control {
            background: #0B132B;
            border: 1px solid var(--border-color);
            color: #FFFFFF;
            padding: 8px 10px;
            border-radius: 6px;
            font-size: 13px;
            outline: none;
            width: 100%;
        }

        .input-control:focus { border-color: var(--accent-cyan); }

        .type-toggle-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .mode-btn {
            background: #0B132B;
            border: 1px solid var(--border-color);
            color: #FFFFFF;
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
        }

        .mode-btn.credit.active { background: var(--accent-green); border-color: #2ECC71; }
        .mode-btn.debit.active { background: var(--accent-red); border-color: #E74C3C; }

        /* Integrated AI Terminal Actions */
        .ai-terminal-box {
            background: #070B19;
            border: 1px solid rgba(0, 198, 255, 0.2);
            border-radius: 8px;
            padding: 10px;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .ai-btn {
            background: linear-gradient(45deg, #00C6FF, #0072FF);
            border: none;
            color: white;
            padding: 8px 12px;
            font-size: 11px;
            font-weight: 700;
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* Database Logs View Table */
        .table-wrapper {
            flex: 1;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: #070B19;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 12px;
        }

        th {
            background: var(--border-color);
            color: var(--accent-cyan);
            padding: 10px;
            position: sticky;
            top: 0;
            text-transform: uppercase;
            font-size: 10px;
            letter-spacing: 0.5px;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid var(--border-color);
            white-space: nowrap;
        }

        .tx-cr { color: #2ECC71; font-weight: 600; }
        .tx-dr { color: #E74C3C; font-weight: 600; }

        .action-icon-btn {
            background: none;
            border: none;
            color: var(--accent-cyan);
            cursor: pointer;
            font-size: 14px;
        }

        /* Bottom Control Panel */
        .footer-control-bar {
            height: 40px;
            background: var(--top-bar-bg);
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 0 20px;
        }

        .settings-launcher {
            color: var(--accent-cyan);
            font-size: 18px;
            cursor: pointer;
            transition: transform 0.3s;
            background: none;
            border: none;
            outline: none;
        }

        .settings-launcher:hover { transform: rotate(45deg); }
    </style>
</head>
<body onload="initializeTerminal()">

    <!-- Header Panel Matrix -->
    <div class="window-control-bar">
        <div class="brand-wrapper">
            <div class="company-logo-frame"></div>
            <div class="brand-title">RAGHUVEER DIAMOND</div>
        </div>
        
        <div class="window-actions">
            <button class="win-btn" onclick="alert('AI Banking Engine Active')">-</button>
            <button class="win-btn" onclick="toggleFullScreen()">🗖</button>
            <button class="win-btn close-btn" onclick="backToDashboard()">✕</button>
        </div>
    </div>

    <!-- Main Responsive Workspace Workspace Split -->
    <div class="bank-workspace">
        
        <!-- Left Workspace: AI Intelligent Transaction Entry -->
        <div class="panel-box">
            <div class="panel-title">AI Transaction Core Engine</div>
            
            <div class="form-scroll-container">
                <div class="form-grid-2">
                    <div class="input-group">
                        <label>Select Master Bank</label>
                        <select class="input-control" id="bank-select" onchange="handleBankChange()">
                            <!-- Banks automatically loaded via settings -->
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Currency Index</label>
                        <select class="input-control" id="currency-select">
                            <option value="INR">INR (₹) - Domestic</option>
                            <option value="USD">USD ($) - Global Forex</option>
                            <option value="EUR">EUR (€) - Euro Matrix</option>
                        </select>
                    </div>
                </div>

                <div class="input-group">
                    <label>Accounting Mode</label>
                    <div class="type-toggle-row">
                        <button class="mode-btn credit active" id="mode-credit" onclick="setAccountingMode('CREDIT')">Credit (Incoming)</button>
                        <button class="mode-btn debit" id="mode-debit" onclick="setAccountingMode('DEBIT')">Debit (Outgoing)</button>
                    </div>
                </div>

                <div class="form-grid-2">
                    <div class="input-group">
                        <label>Transaction Method</label>
                        <select class="input-control" id="method-select" onchange="toggleChequeInput()">
                            <option value="ONLINE">ONLINE / IMPS</option>
                            <option value="NEFT_RTGS">NEFT / RTGS</option>
                            <option value="CHEQUE">BANK CHEQUE</option>
                            <option value="OVERDRAFT">OVERDRAFT (OD)</option>
                            <option value="UPI">UPI SMART CODE</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Transaction Purpose</label>
                        <select class="input-control" id="purpose-select">
                            <!-- Options populate dynamically based on Credit/Debit -->
                        </select>
                    </div>
                </div>

                <div class="form-grid-2">
                    <div class="input-group">
                        <label>Particular / Party Name</label>
                        <input type="text" class="input-control" id="party-name" placeholder="Enter Entity Name">
                    </div>
                    <div class="input-group">
                        <label>Value Amount</label>
                        <input type="number" class="input-control" id="tx-amount" placeholder="0.00">
                    </div>
                </div>

                <div class="form-grid-2">
                    <div class="input-group" id="cheque-number-group" style="display: none;">
                        <label>Cheque / Reference Number</label>
                        <input type="text" class="input-control" id="cheque-no" placeholder="Enter Ref / Cheque No">
                    </div>
                    <div class="input-group">
                        <label>Execution Date</label>
                        <input type="date" class="input-control" id="tx-date">
                    </div>
                </div>

                <!-- 2050 Global AI Terminal Scanning Box -->
                <div class="ai-terminal-box">
                    <div style="display: flex; flex-direction: column; gap: 2px;">
                        <span style="font-size: 11px; font-weight: 700; color: var(--accent-blue);">AI HOLOGRAPHIC TERMINAL 2050</span>
                        <span style="font-size: 9px; color: var(--text-muted);">Dynamic QR Generation & Intelligent Scanner System</span>
                    </div>
                    <div style="display: flex; gap: 5px;">
                        <button class="ai-btn" onclick="generateSmartQR()">QR Gen</button>
                        <button class="ai-btn" onclick="triggerAIScanner()">Scan AI</button>
                    </div>
                </div>
            </div>

            <button class="mode-btn credit active" style="width: 100%; margin-top: 10px; padding: 12px; font-size: 13px; letter-spacing: 0.5px;" id="post-btn" onclick="executePostEntry()">Post Transaction Matrix</button>
        </div>

        <!-- Right Workspace: Dynamic Ledger Data Stream -->
        <div class="panel-box">
            <div class="panel-title">
                <span>Live Account Ledger Database</span>
                <span id="live-clock" style="font-size: 10px; color: var(--text-muted);"></span>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Bank</th>
                            <th>Party / Purpose</th>
                            <th>Method</th>
                            <th>Amount</th>
                            <th>Print</th>
                        </tr>
                    </thead>
                    <tbody id="ledger-rows">
                        <!-- Entries load live dynamically -->
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <!-- Bottom Control Panel Settings Launcher -->
    <div class="footer-control-bar">
        <button class="settings-launcher" onclick="openBankSettings()" title="Global System Settings">⚙️</button>
    </div>

    <script>
        let currentMode = "CREDIT";

        function initializeTerminal() {
            // Set current date automatically
            document.getElementById('tx-date').value = new Date().toISOString().split('T')[0];
            updateClock();
            setInterval(updateClock, 1000);
            loadBankDropdown();
            updatePurposeOptions();
            loadLedgerLogs();
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('live-clock').innerText = now.toLocaleTimeString();
        }

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {});
            } else {
                document.exitFullscreen();
            }
        }

        function backToDashboard() {
            window.location.href = 'main_office.html';
        }

        function openBankSettings() {
            window.location.href = 'bank_settings.html';
        }

        function setAccountingMode(mode) {
            currentMode = mode;
            const postBtn = document.getElementById('post-btn');
            if(mode === 'CREDIT') {
                document.getElementById('mode-credit').classList.add('active');
                document.getElementById('mode-debit').classList.remove('active');
                postBtn.style.background = 'var(--accent-green)';
                postBtn.innerText = "Post Transaction Matrix (Credit)";
            } else {
                document.getElementById('mode-debit').classList.add('active');
                document.getElementById('mode-credit').classList.remove('active');
                postBtn.style.background = 'var(--accent-red)';
                postBtn.innerText = "Post Transaction Matrix (Debit)";
            }
            updatePurposeOptions();
        }

        function updatePurposeOptions() {
            const purposeSelect = document.getElementById('purpose-select');
            if(currentMode === 'CREDIT') {
                purposeSelect.innerHTML = `
                    <option value="SALES_REVENUE">Sales Revenue (હીરા વેચાણ)</option>
                    <option value="ASSET_LIQUIDATION">Asset Liquidation (અન્ય આવક)</option>
                `;
            } else {
                purposeSelect.innerHTML = `
                    <option value="ROUGH_PURCHASE">Rough Purchase (રફ ખરીદી)</option>
                    <option value="BROKERAGE">Brokerage (દલાલી પેમેન્ટ)</option>
                    <option value="ARTISAN_SALARY">Artisan Salary / Wages (કારીગર પગાર)</option>
                    <option value="COMPANY_EXPENSE">Company Expenses (ઓફિસ ખર્ચ)</option>
                `;
            }
        }

        function toggleChequeInput() {
            const method = document.getElementById('method-select').value;
            const chequeGroup = document.getElementById('cheque-number-group');
            if(method === 'CHEQUE') {
                chequeGroup.style.display = 'flex';
            } else {
                chequeGroup.style.display = 'none';
            }
        }

        function generateSmartQR() {
            const amount = document.getElementById('tx-amount').value || "0";
            const currency = document.getElementById('currency-select').value;
            alert(`[AI 2050 ENGINE]: Dynamic Payment QR generated for ${currency} ${amount}`);
        }

        function triggerAIScanner() {
            alert("[AI EYE TERMINAL 2050]: Initializing matrix camera system... Scanning Document for Auto-Fill.");
        }

        function executeCyberPrintStation(party, amount, method, purpose) {
            alert(`[CYBER PRINT MATRIX ACTIVE]\nDocument Type: ${method}\nPayee: ${party}\nAmount: ${amount}\nPurpose: ${purpose}\nStatus: Universal printer profile mapped successfully.`);
        }

        function loadBankDropdown() {
            const dropdown = document.getElementById('bank-select');
            const banks = JSON.parse(localStorage.getItem('master_banks')) || [];
            if(banks.length === 0) {
                dropdown.innerHTML = `<option value="">No Bank Configured! Go to ⚙️</option>`;
                return;
            }
            dropdown.innerHTML = banks.map(b => `<option value="${b.name}">${b.name} [${b.type}]</option>`).join('');
        }

        function executePostEntry() {
            const bank = document.getElementById('bank-select').value;
            const currency = document.getElementById('currency-select').value;
            const method = document.getElementById('method-select').value;
            const purpose = document.getElementById('purpose-select').value;
            const party = document.getElementById('party-name').value;
            const amount = document.getElementById('tx-amount').value;
            const date = document.getElementById('tx-date').value;
            const chequeNo = document.getElementById('cheque-no').value;

            if(!bank || !party || !amount) {
                alert("Execution Halted: Core metrics fields are empty.");
                return;
            }

            const entries = JSON.parse(localStorage.getItem('bank_ledger_logs')) || [];
            entries.unshift({ bank, currency, method, purpose, party, amount: parseFloat(amount), date, mode: currentMode, chequeNo });
            localStorage.setItem('bank_ledger_logs', JSON.stringify(entries));

            // Clear inputs
            document.getElementById('party-name').value = '';
            document.getElementById('tx-amount').value = '';
            document.getElementById('cheque-no').value = '';

            loadLedgerLogs();
        }

        function loadLedgerLogs() {
            const tbody = document.getElementById('ledger-rows');
            const entries = JSON.parse(localStorage.getItem('bank_ledger_logs')) || [];

            if(entries.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:var(--text-muted);">Database Empty.</td></tr>`;
                return;
            }

            tbody.innerHTML = entries.map((e, index) => `
                <tr>
                    <td>${e.bank}</td>
                    <td><strong>${e.party}</strong><br><small style="color:var(--text-muted);">${e.purpose}</small></td>
                    <td>${e.method} ${e.chequeNo ? `<br><small>#${e.chequeNo}</small>` : ''}</td>
                    <td class="${e.mode === 'CREDIT' ? 'tx-cr' : 'tx-dr'}">${e.mode === 'CREDIT' ? '+' : '-'} ${e.currency} ${e.amount.toLocaleString('en-IN')}</td>
                    <td style="text-align:center;">
                        <button class="action-icon-btn" onclick="executeCyberPrintStation('${e.party}', '${e.currency} ${e.amount}', '${e.method}', '${e.purpose}')">🖨️</button>
                    </td>
                </tr>
            `).join('');
        }
    </script>
</body>
</html>
