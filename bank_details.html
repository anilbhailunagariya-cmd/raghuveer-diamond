<!DOCTYPE html> 
<html lang="gu"> 
<head> 
<meta charset="UTF-8"> 
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"> 
<title>Raghuveer Diamond - Bank Ledger Terminal</title> 
<style> 
:root { 
    --bg-primary: #070B19; 
    --bg-secondary: #111D37; 
    --top-bar-bg: #030611; 
    --border-color: #1C2541; 
    --accent-cyan: #5BC0BE; 
    --accent-blue: #00C6FF; 
    --accent-green: #2ECC71; 
    --accent-red: #E74C3C; 
    --accent-purple: #9B59B6; 
    --text-main: #FFFFFF; 
    --text-muted: #8D99AE; 
    --font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
} 
* { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font-family); user-select: none; } 
body { background-color: var(--bg-primary); color: var(--text-main); width: 100vw; height: 100vh; display: flex; flex-direction: column; overflow: hidden; } 

/* Top Header Control Bar */
.window-control-bar { height: 48px; background-color: var(--top-bar-bg); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; border-bottom: 1px solid var(--border-color); flex-shrink: 0; } 
.brand-title { font-size: 14px; font-weight: 900; letter-spacing: 1.5px; color: var(--accent-cyan); text-transform: uppercase; } 
.control-group { display: flex; gap: 8px; }
.btn-win { width: 32px; height: 26px; border: none; border-radius: 4px; color: white; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; font-size: 14px; }
.btn-min { background: #1C2541; }
.btn-max { background: #2A365C; }
.btn-close { background: var(--accent-red); }

/* Responsive Grid */
.balance-board { 
    display: grid; 
    grid-template-columns: repeat(2, 1fr); 
    gap: 12px; 
    padding: 12px; 
    width: 100%;
} 
@media (min-width: 768px) { 
    .balance-board { grid-template-columns: repeat(4, 1fr); gap: 15px; padding: 15px; } 
}

.balance-card { 
    background: var(--bg-secondary); 
    border: 1px solid var(--border-color); 
    border-radius: 12px; 
    padding: 0; 
    position: relative; 
    overflow: hidden; 
    aspect-ratio: 2 / 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    transition: all 0.3s ease;
    cursor: pointer;
} 
.balance-card:hover { border-color: var(--accent-cyan); box-shadow: 0 0 15px rgba(91, 192, 190, 0.3); transform: translateY(-2px); }
.balance-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; } 

#card-top-bank::before { background: var(--accent-blue); }
#card-top-credit::before { background: var(--accent-green); }
#card-top-debit::before { background: var(--accent-red); }
#card-top-transfer::before { background: var(--accent-purple); }

.marquee-strip-container { width: 100%; background: #030611; border-bottom: 1px solid var(--border-color); padding: 8px 10px; min-height: 32px; display: flex; align-items: center; justify-content: center; }
.marquee-strip { font-size: 12px; font-weight: 800; color: var(--accent-cyan); text-transform: uppercase; letter-spacing: 1px; }

.card-content-wrapper { flex: 1; display: flex; justify-content: center; align-items: center; padding: 5px; }
.card-val { font-size: 20px; font-weight: 800; color: #FFFFFF; text-align: center; } 

/* Live Ledger Workspace */
.bank-workspace { 
    flex: 1; 
    padding: 0 12px 12px 12px; 
    display: flex; 
    flex-direction: column; 
    overflow: hidden; 
} 
@media (min-width: 768px) { 
    .bank-workspace { padding: 0 15px 15px 15px; height: calc(100vh - 180px); } 
}

.panel-box { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 12px; padding: 15px; display: flex; flex-direction: column; box-shadow: 0 4px 15px rgba(0,0,0,0.4); flex: 1; overflow: hidden; } 
.panel-title { font-size: 13px; color: var(--accent-cyan); text-transform: uppercase; margin-bottom: 12px; font-weight: 700; border-bottom: 1px dashed var(--border-color); padding-bottom: 8px; letter-spacing: 1px; } 

/* 🛠️ TABLE SCROLL ENHANCEMENTS */
.table-wrapper { 
    flex: 1; 
    overflow-y: auto !important; 
    overflow-x: auto !important; 
    -webkit-overflow-scrolling: touch; 
    touch-action: pan-x pan-y;
    border: 1px solid var(--border-color); 
    border-radius: 6px; 
    background: #070B19; 
} 
table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 480px; } 
th { background: #111D37; color: var(--accent-cyan); padding: 12px 10px; text-transform: uppercase; font-size: 11px; font-weight: 700; text-align: left; position: sticky; top: 0; border-bottom: 1px solid var(--border-color); white-space: nowrap; } 
td { padding: 12px 10px; border-bottom: 1px solid var(--border-color); color: #FFFFFF; white-space: nowrap; } 
.tx-cr { color: var(--accent-green); font-weight: 700; } 
.tx-dr { color: var(--accent-red); font-weight: 700; } 
.tx-tr { color: var(--accent-purple); font-weight: 700; } 

/* Popup Overlay Modals */
.modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(7, 11, 25, 0.88); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 2000; display: none; padding: 10px; } 
.modal-box { background: #111D37; border: 1px solid var(--border-color); border-radius: 12px; width: 95%; max-width: 750px; padding: 25px; box-shadow: 0 0 35px rgba(0, 0, 0, 0.8); max-height: 90vh; overflow-y: auto; } 

.form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 12px; } 
.input-group { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; } 
.input-group label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px; } 
.input-control { background: #070B19; border: 1px solid var(--border-color); color: var(--accent-cyan); padding: 10px; border-radius: 6px; font-size: 13px; font-weight: bold; outline: none; width: 100%; } 
.input-control:focus { border-color: var(--accent-cyan); }
.mode-btn { width: 100%; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: 800; text-transform: uppercase; text-align: center; border: none; font-size: 12px; letter-spacing: 1px; color: var(--bg-primary); background: var(--accent-cyan); margin-top: 5px; transition: 0.3s; } 
.mode-btn:hover { opacity: 0.9; box-shadow: 0 0 15px rgba(255, 255, 255, 0.2); }

/* 📱 MOBILE RESPONSIVE CSS FIXES */
@media (max-width: 768px) {
    body { overflow-y: auto !important; height: auto; min-height: 100vh; }
    .window-control-bar { padding: 0 10px; }
    .brand-title { font-size: 11px; letter-spacing: 0.5px; }
    .balance-board { grid-template-columns: repeat(2, 1fr); gap: 8px; padding: 8px; }
    .balance-card { aspect-ratio: 1.8 / 1; }
    .marquee-strip { font-size: 9px; letter-spacing: 0.5px; }
    .card-val { font-size: 14px; }
    .bank-workspace { padding: 0 8px 8px 8px; height: 380px; }
    .panel-box { padding: 10px; }
    .form-grid-2 { grid-template-columns: 1fr; gap: 0; }
    .modal-box { padding: 15px; width: 98%; }
}
</style> 
</head> 
<body onload="initializeTerminal()"> 

<div class="window-control-bar"> 
 <div class="brand-title">RAGHUVEER DIAMOND - BANK LEDGER TERMINAL</div> 
 <div class="control-group">
     <button class="btn-win btn-min" onclick="triggerMinimize()">-</button>
     <button class="btn-win btn-max" onclick="toggleFullScreen()">🗖</button>
     <button class="btn-win btn-close" onclick="backToDashboard()">✕</button>
 </div>
</div> 

 <div class="balance-board"> 
     <div class="balance-card" id="card-top-bank" onclick="openPopup('bank-modal')"><div class="marquee-strip-container"><div class="marquee-strip">BANK VAULT</div></div><div class="card-content-wrapper"><div class="card-val" id="val-top-vault">₹ 0</div></div></div>
     <div class="balance-card" id="card-top-credit" onclick="openPopup('credit-modal')"><div class="marquee-strip-container"><div class="marquee-strip">CREDIT TRAFFIC</div></div><div class="card-content-wrapper"><div class="card-val" id="val-top-credit">₹ 0</div></div></div>
     <div class="balance-card" id="card-top-debit" onclick="openPopup('debit-modal')"><div class="marquee-strip-container"><div class="marquee-strip">DEBIT FLOW</div></div><div class="card-content-wrapper"><div class="card-val" id="val-top-debit">₹ 0</div></div></div>
     <div class="balance-card" id="card-top-transfer" onclick="openPopup('transfer-modal')"><div class="marquee-strip-container"><div class="marquee-strip">INTERNAL WIRE</div></div><div class="card-content-wrapper"><div class="card-val">TRANSFER</div></div></div>
 </div> 

 <div class="bank-workspace"> 
 <div class="panel-box"> 
 <div class="panel-title">Live Account Ledger Database</div> 
 <div class="table-wrapper"> <table><thead><tr><th>Bank Hierarchy</th><th>Details</th><th>Amount</th></tr></thead><tbody id="ledger-rows"></tbody></table> </div> 
 </div> 
 </div> 

 <!-- ⚙️ 1. BANK VAULT POPUP --> 
 <div class="modal-overlay" id="bank-modal" onclick="closePopup('bank-modal', event)"> 
 <div class="modal-box" onclick="event.stopPropagation()"> 
 <div class="panel-title" style="border:none; margin-bottom:15px; display:flex; justify-content:space-between;"> <span>⚙️ Add New Bank Account</span> <span style="cursor:pointer;" onclick="hidePopupDirect('bank-modal')">✕</span> </div> 
 
 <div class="form-grid-2">
     <div class="input-group"> <label>Bank Name</label> <input type="text" class="input-control" id="new-bank-name" placeholder="e.g. KOTAK, SBI, ICICI"> </div> 
     <div class="input-group"> 
         <label>Account Type</label> 
         <select class="input-control" id="new-bank-type" onchange="toggleCustomAccountInput(this.value)">
             <option value="Saving">Saving Account</option>
             <option value="Current">Current Account</option>
             <option value="Forex">Forex Account</option>
             <option value="Loan">Loan Account</option>
             <option value="CC">CC Account</option>
             <option value="OD">OD Account</option>
             <option value="Other">Other / Custom Account</option>
         </select> 
     </div> 
 </div>

 <div class="input-group" id="custom-account-wrapper" style="display: none; margin-bottom: 12px;">
     <label style="color: var(--accent-blue);">Enter Custom Account Type</label>
     <input type="text" class="input-control" id="new-bank-custom-type" placeholder="e.g. Fixed Deposit, Joint Account">
 </div>

 <div class="form-grid-2">
     <div class="input-group"> <label>Account Number</label> <input type="text" class="input-control" id="new-bank-acc" placeholder="Enter A/C Number"> </div> 
     <div class="input-group"> <label>IFSC Code</label> <input type="text" class="input-control" id="new-bank-ifsc" placeholder="Enter IFSC Code"> </div> 
 </div>

 <div class="input-group"> 
     <label>Account Holder Name</label> 
     <input type="text" class="input-control" id="new-bank-holder" placeholder="Enter Account Holder Full Name"> 
 </div> 
 
 <button class="mode-btn" style="background:var(--accent-blue); color:white;" onclick="addBankMatrix()">Live Link Account</button> 
 </div> 
 </div> 

 <!-- 🟢 2. CREDIT ENTRY POPUP --> 
 <div class="modal-overlay" id="credit-modal" onclick="closePopup('credit-modal', event)"> 
 <div class="modal-box" onclick="event.stopPropagation()"> 
 <div class="panel-title" style="border:none; margin-bottom:15px; display:flex; justify-content:space-between;"> <span>🟢 Deposit Matrix (Credit)</span> <span style="cursor:pointer;" onclick="hidePopupDirect('credit-modal')">✕</span> </div> 
 
 <div class="form-grid-2">
     <div class="input-group"><label>Bank</label><select class="input-control" id="cr-bank-select"></select></div>
     <div class="input-group">
         <label>Method</label>
         <select class="input-control" id="cr-method" onchange="toggleCustomCreditMethod(this.value)">
             <option value="ONLINE">ONLINE / IMPS</option>
             <option value="CHEQUE">CHEQUE</option>
             <option value="Other">Other / Custom Method</option>
         </select>
     </div>
 </div>

 <div class="input-group" id="custom-cr-method-wrapper" style="display: none; margin-bottom: 12px;">
     <label style="color: var(--accent-green);">Enter Custom Method</label>
     <input type="text" class="input-control" id="cr-custom-method" placeholder="e.g. RTGS, CASH VOUCHER">
 </div>

 <div class="form-grid-2">
     <div class="input-group">
         <label>Purpose</label>
         <select class="input-control" id="cr-purpose" onchange="toggleCustomCreditPurpose(this.value)">
             <option value="Sales Revenue">Sales Revenue</option>
             <option value="Promoter Capital">Promoter Capital</option>
             <option value="GST Refund">GST Refund</option>
             <option value="Other">Other / Custom Purpose</option>
         </select>
     </div>
     <div class="input-group"><label>Amount</label><input type="number" class="input-control" id="cr-amount" placeholder="0.00"></div>
 </div>

 <div class="input-group" id="custom-cr-purpose-wrapper" style="display: none; margin-bottom: 12px;">
     <label style="color: var(--accent-green);">Enter Custom Purpose</label>
     <input type="text" class="input-control" id="cr-custom-purpose" placeholder="e.g. Interest Credit, Subsidy">
 </div>

 <div class="input-group">
     <label>Party Name</label>
     <input type="text" class="input-control" id="cr-party" placeholder="Enter Full Entity / Party Name">
 </div>

 <button class="mode-btn" style="background:var(--accent-green); color:white;" onclick="executeTransaction('CREDIT')">Post Credit Entry</button> 
 </div> 
 </div> 

 <!-- 🔴 3. DEBIT ENTRY POPUP --> 
 <div class="modal-overlay" id="debit-modal" onclick="closePopup('debit-modal', event)"> 
 <div class="modal-box" onclick="event.stopPropagation()"> 
 <div class="panel-title" style="border:none; margin-bottom:15px; display:flex; justify-content:space-between;"> <span>🔴 Expense Matrix (Debit)</span> <span style="cursor:pointer;" onclick="hidePopupDirect('debit-modal')">✕</span> </div> 
 
 <div class="form-grid-2">
     <div class="input-group"><label>Bank</label><select class="input-control" id="dr-bank-select"></select></div>
     <div class="input-group">
         <label>Method</label>
         <select class="input-control" id="dr-method" onchange="toggleCustomDebitMethod(this.value)">
             <option value="ONLINE">ONLINE / IMPS</option>
             <option value="CHEQUE">CHEQUE</option>
             <option value="Other">Other / Custom Method</option>
         </select>
     </div>
 </div>

 <div class="input-group" id="custom-dr-method-wrapper" style="display: none; margin-bottom: 12px;">
     <label style="color: var(--accent-red);">Enter Custom Method</label>
     <input type="text" class="input-control" id="dr-custom-method" placeholder="e.g. RTGS, CASH">
 </div>

 <div class="form-grid-2">
     <div class="input-group">
         <label>Purpose</label>
         <select class="input-control" id="dr-purpose" onchange="toggleCustomDebitPurpose(this.value)">
             <option value="Rough Purchase">Rough Purchase</option>
             <option value="Brokerage">Brokerage</option>
             <option value="Wages & Salaries">Wages & Salaries</option>
             <option value="Factory Expenses">Factory Expenses</option>
             <option value="Other">Other / Custom Purpose</option>
         </select>
     </div>
     <div class="input-group"><label>Amount</label><input type="number" class="input-control" id="dr-amount" placeholder="0.00"></div>
 </div>

 <div class="input-group" id="custom-dr-purpose-wrapper" style="display: none; margin-bottom: 12px;">
     <label style="color: var(--accent-red);">Enter Custom Purpose</label>
     <input type="text" class="input-control" id="dr-custom-purpose" placeholder="e.g. Office Rent, Light Bill">
 </div>

 <div class="input-group">
     <label>Party Name</label>
     <input type="text" class="input-control" id="dr-party" placeholder="Enter Full Entity / Party Name">
 </div>

 <button class="mode-btn" style="background:var(--accent-red); color:white;" onclick="executeTransaction('DEBIT')">Post Debit Entry</button> 
 </div> 
 </div> 

 <!-- 🟣 4. BANK TRANSFER POPUP --> 
 <div class="modal-overlay" id="transfer-modal" onclick="closePopup('transfer-modal', event)"> 
 <div class="modal-box" onclick="event.stopPropagation()"> 
 <div class="panel-title" style="border:none; margin-bottom:15px; display:flex; justify-content:space-between;"> <span>🟣 Interbank Transfer Protocol</span> <span style="cursor:pointer;" onclick="hidePopupDirect('transfer-modal')">✕</span> </div> 
 
 <div class="form-grid-2">
     <div class="input-group"><label>From Bank</label><select class="input-control" id="tr-src-bank"></select></div>
     <div class="input-group"><label>To Bank</label><select class="input-control" id="tr-dest-bank"></select></div>
 </div>

 <div class="form-grid-2">
     <div class="input-group">
         <label>Method</label>
         <select class="input-control" id="tr-method" onchange="toggleCustomTransferMethod(this.value)">
             <option value="ONLINE">ONLINE / IMPS</option>
             <option value="CHEQUE">CHEQUE</option>
             <option value="Other">Other / Custom Method</option>
         </select>
     </div>
     <div class="input-group"><label>Amount</label><input type="number" class="input-control" id="tr-amount" placeholder="0.00"></div>
 </div>

 <div class="input-group" id="custom-tr-method-wrapper" style="display: none; margin-bottom: 12px;">
     <label style="color: var(--accent-purple);">Enter Custom Transfer Method</label>
     <input type="text" class="input-control" id="tr-custom-method" placeholder="e.g. RTGS, NEFT, BOOK TRANSFER">
 </div>

 <button class="mode-btn" style="background:var(--accent-purple); color:white;" onclick="executeTransaction('TRANSFER')">Execute Transfer</button> 
 </div> 
 </div> 

<script> 
 const systemDataBus = new BroadcastChannel('raghuveer_ai_core_bus');

 const userRole = sessionStorage.getItem('userRole') || localStorage.getItem('lastActiveRole');
 if(userRole !== 'director' && userRole !== 'accountant') {
     alert("ACCESS DENIED: Restricted to Director and Accountant levels.");
     window.location.href = "index.html";
 }

 function toggleFullScreen() { 
     if (!document.fullscreenElement) {
         document.documentElement.requestFullscreen().catch(e => {});
     } else {
         document.exitFullscreen().catch(e => {});
     }
 }
 function triggerMinimize() { alert("Terminal view minimized."); }

 function initializeTerminal() { 
     if(!localStorage.getItem('factory_banks')) {
         const initialBanks = [
             { name: "KOTAK MAHINDRA BANK", acc: "9876543210", ifsc: "KKBK00001", holder: "Raghuveer Diamond", type: "Current Account", balance: 5000000 },
             { name: "STATE BANK OF INDIA", acc: "1234567890", ifsc: "SBIN00002", holder: "Raghuveer Diamond", type: "Current Account", balance: 2500000 }
         ];
         localStorage.setItem('factory_banks', JSON.stringify(initialBanks));
     }
     refreshBankData(); 
 } 
 
 function backToDashboard() { window.location.href = 'main_office.html'; } 

 function openPopup(id) { document.getElementById(id).style.display = 'flex'; } 
 function closePopup(id, e) { if(e.target.id === id) hidePopupDirect(id); }
 function hidePopupDirect(id) { 
     document.getElementById(id).style.display = 'none'; 
     if(id === 'bank-modal') document.getElementById('custom-account-wrapper').style.display = 'none';
     if(id === 'credit-modal') {
         document.getElementById('custom-cr-method-wrapper').style.display = 'none';
         document.getElementById('custom-cr-purpose-wrapper').style.display = 'none';
     }
     if(id === 'debit-modal') {
         document.getElementById('custom-dr-method-wrapper').style.display = 'none';
         document.getElementById('custom-dr-purpose-wrapper').style.display = 'none';
     }
     if(id === 'transfer-modal') document.getElementById('custom-tr-method-wrapper').style.display = 'none';
 }

 function toggleCustomAccountInput(value) {
     const customWrapper = document.getElementById('custom-account-wrapper');
     customWrapper.style.display = value === 'Other' ? 'flex' : 'none';
     if(value === 'Other') document.getElementById('new-bank-custom-type').focus();
 }

 function toggleCustomCreditMethod(value) {
     const wrapper = document.getElementById('custom-cr-method-wrapper');
     wrapper.style.display = value === 'Other' ? 'flex' : 'none';
     if(value === 'Other') document.getElementById('cr-custom-method').focus();
 }

 function toggleCustomCreditPurpose(value) {
     const wrapper = document.getElementById('custom-cr-purpose-wrapper');
     wrapper.style.display = value === 'Other' ? 'flex' : 'none';
     if(value === 'Other') document.getElementById('cr-custom-purpose').focus();
 }

 function toggleCustomDebitMethod(value) {
     const wrapper = document.getElementById('custom-dr-method-wrapper');
     wrapper.style.display = value === 'Other' ? 'flex' : 'none';
     if(value === 'Other') document.getElementById('dr-custom-method').focus();
 }

 function toggleCustomDebitPurpose(value) {
     const wrapper = document.getElementById('custom-dr-purpose-wrapper');
     wrapper.style.display = value === 'Other' ? 'flex' : 'none';
     if(value === 'Other') document.getElementById('dr-custom-purpose').focus();
 }

 function toggleCustomTransferMethod(value) {
     const wrapper = document.getElementById('custom-tr-method-wrapper');
     wrapper.style.display = value === 'Other' ? 'flex' : 'none';
     if(value === 'Other') document.getElementById('tr-custom-method').focus();
 }

 function addBankMatrix() { 
     const name = document.getElementById('new-bank-name').value.trim();
     const acc = document.getElementById('new-bank-acc').value.trim();
     const ifsc = document.getElementById('new-bank-ifsc').value.trim();
     const holder = document.getElementById('new-bank-holder').value.trim();
     let type = document.getElementById('new-bank-type').value;

     if(type === 'Other') {
         const customType = document.getElementById('new-bank-custom-type').value.trim();
         if(!customType) { alert('Please enter custom account type.'); return; }
         type = customType + " Account";
     } else {
         type = type + " Account";
     }

     if(!name || !acc || !ifsc || !holder) { alert('Please fill complete bank details.'); return; }
     
     const banks = JSON.parse(localStorage.getItem('factory_banks')) || []; 
     banks.push({ name: name, acc: acc, ifsc: ifsc, holder: holder, type: type, balance: 0 }); 
     localStorage.setItem('factory_banks', JSON.stringify(banks)); 
     
     document.getElementById('new-bank-name').value = ''; 
     document.getElementById('new-bank-acc').value = '';
     document.getElementById('new-bank-ifsc').value = '';
     document.getElementById('new-bank-holder').value = '';
     document.getElementById('new-bank-custom-type').value = '';
     document.getElementById('new-bank-type').value = 'Saving';
     document.getElementById('custom-account-wrapper').style.display = 'none';
     
     hidePopupDirect('bank-modal'); 
     refreshBankData(); 
     systemDataBus.postMessage({ type: "PRODUCTION_DATA_MUTATION", module: "bank_details" });
 } 

 function refreshBankData() { 
     const banks = JSON.parse(localStorage.getItem('factory_banks')) || []; 
     const fillSelect = (id) => {
         const el = document.getElementById(id);
         if(el) el.innerHTML = banks.length > 0 ? banks.map(b => `<option value="${b.name}">${b.name}</option>`).join('') : '<option value="">No Bank Registered</option>';
     };
     fillSelect('cr-bank-select'); fillSelect('dr-bank-select'); fillSelect('tr-src-bank'); fillSelect('tr-dest-bank');

     let total = banks.reduce((s, b) => s + (b.balance || 0), 0);
     document.getElementById('val-top-vault').innerText = `₹ ${total.toLocaleString('en-IN')}`;
     
     const entries = JSON.parse(localStorage.getItem('bank_ledger_logs')) || [];
     let totalCr = entries.filter(e => e.mode === 'CREDIT').reduce((sum, e) => sum + e.amount, 0);
     let totalDr = entries.filter(e => e.mode === 'DEBIT').reduce((sum, e) => sum + e.amount, 0);
     document.getElementById('val-top-credit').innerText = `₹ ${totalCr.toLocaleString('en-IN')}`;
     document.getElementById('val-top-debit').innerText = `₹ ${totalDr.toLocaleString('en-IN')}`;
     loadLedgerLogs();
 }

 function executeTransaction(mode) {
     const banks = JSON.parse(localStorage.getItem('factory_banks')) || [];
     const entries = JSON.parse(localStorage.getItem('bank_ledger_logs')) || [];
     
     if(mode === 'CREDIT') {
         const bank = document.getElementById('cr-bank-select').value;
         const amount = parseFloat(document.getElementById('cr-amount').value);
         let method = document.getElementById('cr-method').value;
         let purpose = document.getElementById('cr-purpose').value;
         const party = document.getElementById('cr-party').value.trim();

         if(method === 'Other') {
             const customMethod = document.getElementById('cr-custom-method').value.trim();
             if(!customMethod) { alert('Please enter custom method.'); return; }
             method = customMethod;
         }

         if(purpose === 'Other') {
             const customPurpose = document.getElementById('cr-custom-purpose').value.trim();
             if(!customPurpose) { alert('Please enter custom purpose.'); return; }
             purpose = customPurpose;
         }

         if(!bank || isNaN(amount) || amount <= 0 || !party) { alert('Please fill complete transaction details.'); return; }
         
         const bIdx = banks.findIndex(b => b.name === bank); 
         if(bIdx !== -1) banks[bIdx].balance += amount;
         entries.unshift({ bank, method, purpose, party, amount, mode, timestamp: new Date().toISOString() });
         
         document.getElementById('cr-amount').value = ''; 
         document.getElementById('cr-party').value = ''; 
         document.getElementById('cr-custom-method').value = '';
         document.getElementById('cr-custom-purpose').value = '';
         document.getElementById('cr-method').value = 'ONLINE';
         document.getElementById('cr-purpose').value = 'Sales Revenue';
         document.getElementById('custom-cr-method-wrapper').style.display = 'none';
         document.getElementById('custom-cr-purpose-wrapper').style.display = 'none';
         
         hidePopupDirect('credit-modal');
     } else if(mode === 'DEBIT') {
         const bank = document.getElementById('dr-bank-select').value;
         const amount = parseFloat(document.getElementById('dr-amount').value);
         let method = document.getElementById('dr-method').value;
         let purpose = document.getElementById('dr-purpose').value;
         const party = document.getElementById('dr-party').value.trim();

         if(method === 'Other') {
             const customMethod = document.getElementById('dr-custom-method').value.trim();
             if(!customMethod) { alert('Please enter custom method.'); return; }
             method = customMethod;
         }

         if(purpose === 'Other') {
             const customPurpose = document.getElementById('dr-custom-purpose').value.trim();
             if(!customPurpose) { alert('Please enter custom purpose.'); return; }
             purpose = customPurpose;
         }

         if(!bank || isNaN(amount) || amount <= 0 || !party) { alert('Please fill complete transaction details.'); return; }
         
         const bIdx = banks.findIndex(b => b.name === bank); 
         if(bIdx !== -1) banks[bIdx].balance -= amount;
         entries.unshift({ bank, method, purpose, party, amount, mode, timestamp: new Date().toISOString() });
         
         document.getElementById('dr-amount').value = ''; 
         document.getElementById('dr-party').value = ''; 
         document.getElementById('dr-custom-method').value = '';
         document.getElementById('dr-custom-purpose').value = '';
         document.getElementById('dr-method').value = 'ONLINE';
         document.getElementById('dr-purpose').value = 'Rough Purchase';
         document.getElementById('custom-dr-method-wrapper').style.display = 'none';
         document.getElementById('custom-dr-purpose-wrapper').style.display = 'none';
         
         hidePopupDirect('debit-modal');
     } else if(mode === 'TRANSFER') {
         const src = document.getElementById('tr-src-bank').value;
         const dest = document.getElementById('tr-dest-bank').value;
         const amount = parseFloat(document.getElementById('tr-amount').value);
         let method = document.getElementById('tr-method').value;

         if(method === 'Other') {
             const customMethod = document.getElementById('tr-custom-method').value.trim();
             if(!customMethod) { alert('Please enter custom transfer method.'); return; }
             method = customMethod;
         }

         if(!src || !dest || src === dest || isNaN(amount) || amount <= 0) { alert('Please fill complete transfer details.'); return; }
         
         const srcIdx = banks.findIndex(b => b.name === src);
         const destIdx = banks.findIndex(b => b.name === dest);
         if(srcIdx !== -1 && destIdx !== -1) {
             banks[srcIdx].balance -= amount;
             banks[destIdx].balance += amount;
         }
         entries.unshift({ bank: src, destBank: dest, method: method, purpose: 'INTERNAL_TRANSFER', party: `To ${dest}`, amount, mode, timestamp: new Date().toISOString() });
         
         document.getElementById('tr-amount').value = ''; 
         document.getElementById('tr-custom-method').value = '';
         document.getElementById('tr-method').value = 'ONLINE';
         document.getElementById('custom-tr-method-wrapper').style.display = 'none';
         
         hidePopupDirect('transfer-modal');
     }
     localStorage.setItem('factory_banks', JSON.stringify(banks));
     localStorage.setItem('bank_ledger_logs', JSON.stringify(entries));
     refreshBankData();
     
     systemDataBus.postMessage({ type: "PRODUCTION_DATA_MUTATION", module: "bank_details" });
 }

 function loadLedgerLogs() { 
     const tbody = document.getElementById('ledger-rows'); 
     const entries = JSON.parse(localStorage.getItem('bank_ledger_logs')) || []; 
     if(entries.length === 0) { 
         tbody.innerHTML = `<tr><td colspan="3" style="text-align:center; color:var(--text-muted); padding:20px;">No operational records found.</td></tr>`; 
         return; 
     } 
     tbody.innerHTML = entries.map((e) => { 
         let c = e.mode === 'DEBIT' ? 'tx-dr' : (e.mode === 'TRANSFER' ? 'tx-tr' : 'tx-cr'); 
         let s = e.mode === 'DEBIT' ? '-' : (e.mode === 'TRANSFER' ? '⇄' : '+'); 
         return `<tr><td><strong>${e.bank}</strong>${e.destBank ? ` ➔ ${e.destBank}` : ''}</td><td><strong>${e.party || 'Internal Vault'}</strong><br><small style="color:var(--text-muted);">${e.purpose} (${e.method})</small></td><td class="${c}">${s} ₹ ${e.amount.toLocaleString('en-IN')}</td></tr>`; 
     }).join(''); 
 } 
</script>
