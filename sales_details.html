
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Raghuveer Diamond - Global Sales Core</title>
    <style>
        :root {
            --bg: #070B19;
            --card: #0B132B;
            --cyan: #5BC0BE;
            --blue: #00C6FF;
            --border: #1C2541;
            --text: #FFFFFF;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; width: 100vw; overflow: hidden; display: flex; flex-direction: column; }

        /* Window Header Matrix */
        .header { height: 45px; background: #070B19; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; border-bottom: 1px solid var(--border); }
        .win-actions { display: flex; gap: 5px; }
        .win-btn { background: #111D37; color: var(--cyan); border: 1px solid var(--border); width: 25px; height: 25px; cursor: pointer; border-radius: 4px; }

        .container { padding: 8px; display: flex; flex-direction: column; gap: 6px; flex: 1; }
        
        /* Form Top Grid */
        .top-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .form-group { display: flex; flex-direction: column; }
        label { font-size: 9px; color: #708090; text-transform: uppercase; margin-bottom: 2px; font-weight: 600; letter-spacing: 0.5px; }
        input, select { background: var(--card); border: 1px solid var(--border); color: #FFF; padding: 5px; border-radius: 4px; font-size: 11px; outline: none; }
        input:focus, select:focus { border-color: var(--cyan); }
        .input-row { display: flex; gap: 4px; }
        .plus-btn { background: #1C2541; color: var(--cyan); border: none; width: 26px; cursor: pointer; border-radius: 4px; font-weight: bold; }

        /* Scrollable Row Diamond Table Matrix */
        .table-container { flex: 1; overflow-y: auto; background: #0b1428; border: 1px solid var(--border); border-radius: 6px; padding: 5px; max-height: 180px; }
        .diamond-row { display: grid; grid-template-columns: repeat(4, 1fr) 0.8fr 1fr; gap: 4px; padding: 4px 0; border-bottom: 1px dashed var(--border); }
        .diamond-row input, .diamond-row select { padding: 4px; font-size: 10px; }

        /* Lower Matrix Calculation Core */
        .bottom-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; background: #080f21; padding: 6px; border-radius: 6px; border: 1px solid var(--border); }
        
        .submit-btn { background: var(--cyan); color: #000; padding: 8px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 12px; letter-spacing: 0.5px; text-align: center; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-size:12px; font-weight:bold; letter-spacing:1px; color:var(--cyan)">RAGHUVEER DIAMOND - SALES CORE</div>
        <div class="win-actions">
            <button class="win-btn">-</button><button class="win-btn">🗖</button>
            <a href="main_office.html"><button class="win-btn">✕</button></a>
        </div>
    </div>

    <div class="container">
        <div class="top-grid">
            <div class="form-group"><label>Invoice No</label><input type="text" id="inv-no" placeholder="INV-101"></div>
            <div class="form-group"><label>Sales Date</label><input type="date" id="sales-date"></div>
            
            <div class="form-group"><label>Sales Type Stream</label>
                <select id="sales-type" onchange="toggleSalesType()">
                    <option value="local">Local Sales (INR)</option>
                    <option value="export">Export Sales (USD)</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Customer Name</label>
                <div class="input-row">
                    <select id="customer" style="flex:1;"><option value="">-- Select --</option></select>
                    <button class="plus-btn" onclick="addDropdownItem('sl_customers', 'customer')">+</button>
                </div>
            </div>

            <div class="form-group">
                <label>Broker Class</label>
                <select id="broker-switch" onchange="toggleBrokerBlock()">
                    <option value="direct">Direct Client</option>
                    <option value="broker">Via Brokerage</option>
                </select>
            </div>

            <div id="broker-block" class="hidden">
                <div class="form-group">
                    <label>Broker Name</label>
                    <div class="input-row">
                        <select id="broker" style="flex:1;"><option value="">-- Select --</option></select>
                        <button class="plus-btn" onclick="addDropdownItem('sl_brokers', 'broker')">+</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Multi-Line Dynamic Diamond Matrix Box -->
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <label style="color:var(--cyan)">Diamond Inventory Specifications</label>
            <button class="plus-btn" style="width:50px; font-size:10px; padding:2px;" onclick="addDiamondRow()">+ Row</button>
        </div>
        
        <div class="table-container" id="matrix-body">
            <!-- Dynamic rows inject here -->
        </div>

        <!-- Advanced Payment Terms & Smart Discount Engine -->
        <div class="bottom-grid">
            <div class="form-group"><label>Payment Terms</label>
                <select id="payment-term" onchange="calculateFinancials()">
                    <option value="cash">Cash Settlement (Immediate)</option>
                    <option value="30">30 Days Credit Term</option>
                    <option value="60">60 Days Credit Term</option>
                    <option value="90">90 Days Net Term</option>
                </select>
            </div>
            <div class="form-group"><label>Due Date</label><input type="date" id="due-date" readonly></div>
            <div class="form-group"><label>Auto Discount (%)</label><input type="number" id="discount-pct" value="0" step="0.01" oninput="calculateFinancials()"></div>
            <div class="form-group"><label>Tax Class (GST)</label>
                <select id="tax-rate" onchange="calculateFinancials()">
                    <option value="0">Exempted / Outward (0%)</option>
                    <option value="0.25">GST Local (0.25%)</option>
                    <option value="1.5">GST Internal (1.5%)</option>
                </select>
            </div>
            <div class="form-group" style="grid-column: span 2;">
                <label style="color:var(--cyan)" id="total-label">Net Payable Amount (INR)</label>
                <input type="text" id="net-payable" readonly style="color:var(--cyan); font-weight:bold; font-size:14px;" value="0.00">
            </div>
        </div>

        <button class="submit-btn" onclick="commitSalesLedger()">Commit Sales Entry</button>
    </div>

    <script>
        document.getElementById('sales-date').valueAsDate = new Date();

        function toggleSalesType() {
            let type = document.getElementById('sales-type').value;
            let taxSelect = document.getElementById('tax-rate');
            let label = document.getElementById('total-label');
            if(type === 'export') {
                taxSelect.value = "0";
                taxSelect.disabled = true;
                label.innerText = "Net Payable Amount (USD)";
            } else {
                taxSelect.disabled = false;
                label.innerText = "Net Payable Amount (INR)";
            }
            calculateFinancials();
        }

        function toggleBrokerBlock() {
            let sw = document.getElementById('broker-switch').value;
            let el = document.getElementById('broker-block');
            sw === 'broker' ? el.classList.remove('hidden') : el.classList.add('hidden');
        }

        function addDropdownItem(storageKey, selectId) {
            let val = prompt("Enter New Matrix Field:");
            if(val && val.trim() !== "") {
                let list = JSON.parse(localStorage.getItem(storageKey)) || [];
                if(!list.includes(val.trim())) {
                    list.push(val.trim());
                    localStorage.setItem(storageKey, JSON.stringify(list));
                    renderSelect(storageKey, selectId);
                    document.getElementById(selectId).value = val.trim();
                }
            }
        }

        function renderSelect(key, id) {
            let list = JSON.parse(localStorage.getItem(key)) || [];
            let el = document.getElementById(id);
            el.innerHTML = '<option value="">-- Select --</option>';
            list.forEach(i => el.innerHTML += `<option value="${i}">${i}</option>`);
        }

        // Add Multi-Line Diamond Entries
        function addDiamondRow() {
            let container = document.getElementById('matrix-body');
            let row = document.createElement('div');
            row.className = 'diamond-row';
            row.innerHTML = `
                <select class="purity"><option>VVS1</option><option>VVS2</option><option>VS1</option><option>VS2</option></select>
                <select class="color"><option>D</option><option>E</option><option>F</option><option>G</option></select>
                <select class="sieve"><option>+2</option><option>-2</option><option>+11</option><option>-11</option><option>+13</option></select>
                <input type="number" class="diameter" placeholder="MM" step="0.01">
                <input type="number" class="carat" placeholder="Cts" step="0.01" oninput="calculateFinancials()">
                <input type="number" class="price" placeholder="Price" step="0.01" oninput="calculateFinancials()">
            `;
            container.appendChild(row);
        }

        function calculateFinancials() {
            let baseAmount = 0;
            let rows = document.querySelectorAll('.diamond-row');
            
            rows.forEach(row => {
                let cts = parseFloat(row.querySelector('.carat').value) || 0;
                let prc = parseFloat(row.querySelector('.price').value) || 0;
                baseAmount += (cts * prc);
            });

            // Auto Days Term Logic
            let term = document.getElementById('payment-term').value;
            let discInput = document.getElementById('discount-pct');
            let today = new Date();
            
            if(term === 'cash') {
                discInput.value = "2.00"; // Auto 2% cash discount
                document.getElementById('due-date').valueAsDate = today;
            } else {
                let days = parseInt(term);
                if(days === 30) discInput.value = "1.00";
                if(days === 60 || days === 90) discInput.value = "0.00";
                
                let targetDate = new Date();
                targetDate.setDate(today.getDate() + days);
                document.getElementById('due-date').valueAsDate = targetDate;
            }

            let discPct = parseFloat(discInput.value) || 0;
            baseAmount = baseAmount - (baseAmount * discPct / 100);

            let taxPct = parseFloat(document.getElementById('tax-rate').value) || 0;
            let total = baseAmount + (baseAmount * taxPct / 100);

            document.getElementById('net-payable').value = total.toLocaleString('en-IN', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        }

        function commitSalesLedger() {
            let finalValue = parseFloat(document.getElementById('net-payable').value.replace(/,/g, '')) || 0;
            let type = document.getElementById('sales-type').value;

            // Converter Matrix if USD Export mode activated
            if(type === 'export') {
                let conversionRate = parseFloat(localStorage.getItem('usd_rate')) || 83.72;
                finalValue = finalValue * conversionRate;
            }

            let activeSales = parseFloat(localStorage.getItem('global_sales')) || 0;
            localStorage.setItem('global_sales', activeSales + finalValue);

            alert("Sales Transaction Committed into Core Ledger!");
            window.location.href = 'main_office.html';
        }

        // Startup System Matrix Configuration
        renderSelect('sl_customers', 'customer');
        renderSelect('sl_brokers', 'broker');
        addDiamondRow(); // Init with 1 Default line
        calculateFinancials();
    </script>
</body>
</html>
