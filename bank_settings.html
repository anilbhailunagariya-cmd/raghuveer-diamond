<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Raghuveer Diamond - Bank Settings Terminal</title>
    <style>
        /* ========================================================
           GLOBAL CENTRALIZED THEME VARIABLES (SYNCED WITH INDEX.HTML)
           ======================================================== */
        :root {
            --bg-primary: #070B19;
            --bg-secondary: #111D37;
            --top-bar-bg: #030611;
            --border-color: #1C2541;
            --accent-cyan: #5BC0BE;
            --accent-blue: #00C6FF;
            --accent-red: #E74C3C;
            --text-main: #FFFFFF;
            --text-muted: #8D99AE;
            --font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-family);
            user-select: none;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Top Bar Matrix */
        .window-control-bar {
            height: 48px;
            background-color: var(--top-bar-bg);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 0 0 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .brand-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .company-logo-frame {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: linear-gradient(45deg, var(--accent-blue), #0072FF);
            box-shadow: 0 0 8px var(--accent-blue);
        }

        .brand-title {
            font-size: 15px;
            font-weight: 900;
            letter-spacing: 1.5px;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-blue), #0072FF, var(--accent-cyan));
            background-size: 300% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: cyberGlow 6s linear infinite;
            text-transform: uppercase;
        }

        @keyframes cyberGlow {
            0% { background-position: 0% center; }
            100% { background-position: 300% center; }
        }

        .window-actions {
            display: flex;
            height: 100%;
        }

        .win-btn {
            background: none;
            border: none;
            color: var(--accent-cyan);
            width: 45px;
            height: 100%;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .win-btn:hover { background: var(--border-color); color: #FFFFFF; }
        .win-btn.close-btn:hover { background: var(--accent-red); color: #FFFFFF; }

        /* Split Workspace - Responsive Grid */
        .settings-workspace {
            flex: 1;
            padding: 15px;
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 15px;
            height: calc(100vh - 48px);
        }

        @media (max-width: 900px) {
            .settings-workspace {
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr;
                overflow-y: auto;
            }
        }

        .panel-box {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 18px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            overflow: hidden;
        }

        .panel-title {
            font-size: 13px;
            color: var(--accent-cyan);
            text-transform: uppercase;
            margin-bottom: 12px;
            font-weight: 700;
            letter-spacing: 1px;
            border-bottom: 1px dashed var(--border-color);
            padding-bottom: 6px;
        }

        .form-scroll-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
            flex: 1;
            padding-right: 5px;
        }

        .form-grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .input-group label {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 700;
        }

        .input-control {
            background: #070B19;
            border: 1px solid var(--border-color);
            color: #FFFFFF;
            padding: 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
            outline: none;
            width: 100%;
        }

        .input-control:focus { border-color: var(--accent-cyan); }

        .submit-btn {
            background: var(--accent-cyan);
            color: var(--bg-primary);
            border: none;
            padding: 12px;
            font-size: 12px;
            font-weight: 800;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
            width: 100%;
            transition: 0.3s;
        }

        .submit-btn:hover {
            background: #FFFFFF;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
        }

        /* Table Style */
        .table-wrapper {
            flex: 1;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: #070B19;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 12px;
        }

        th {
            background: var(--bg-secondary);
            color: var(--accent-cyan);
            padding: 10px;
            position: sticky;
            top: 0;
            text-transform: uppercase;
            font-size: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        td {
            padding: 10px;
            border-bottom: 1px solid var(--border-color);
            white-space: nowrap;
        }

        .delete-btn {
            background: none;
            border: none;
            color: var(--accent-red);
            cursor: pointer;
            font-size: 14px;
        }
    </style>
</head>
<body onload="loadMasterBanks()">

    <!-- Header Panel Matrix -->
    <div class="window-control-bar">
        <div class="brand-wrapper">
            <div class="company-logo-frame"></div>
            <div class="brand-title">RAGHUVEER DIAMOND - BANK SETTINGS</div>
        </div>
        
        <div class="window-actions">
            <button class="win-btn" onclick="triggerMinimize()">-</button>
            <button class="win-btn" onclick="toggleFullScreen()">🗖</button>
            <button class="win-btn close-btn" onclick="backToTerminal()">✕</button>
        </div>
    </div>

    <!-- Workspace Configuration Matrix -->
    <div class="settings-workspace">
        
        <!-- Left Panel: Add Master Bank Form -->
        <div class="panel-box">
            <div class="panel-title">⚙️ Add Master Bank Configuration</div>
            
            <div class="form-scroll-container">
                <div class="form-grid-2">
                    <div class="input-group">
                        <label>Bank Name</label>
                        <input type="text" class="input-control" id="cfg-bank-name" placeholder="e.g. Kotak Mahindra Bank">
                    </div>
                    <div class="input-group">
                        <label>Bank Holder Name</label>
                        <input type="text" class="input-control" id="cfg-holder-name" placeholder="Company / Individual Name">
                    </div>
                </div>

                <div class="form-grid-2">
                    <div class="input-group">
                        <label>Account Number</label>
                        <input type="text" class="input-control" id="cfg-acc-number" placeholder="Enter Account No">
                    </div>
                    <div class="input-group">
                        <label>IFSC / SWIFT Code</label>
                        <input type="text" class="input-control" id="cfg-ifsc" placeholder="Enter Bank Code">
                    </div>
                </div>

                <div class="form-grid-2">
                    <div class="input-group">
                        <label>Account Facility Type</label>
                        <select class="input-control" id="cfg-acc-type">
                            <option value="Current Account">Current Account</option>
                            <option value="Forex Account">Forex Account</option>
                            <option value="CC Account">CC (Cash Credit)</option>
                            <option value="OD Account">OD (Overdraft)</option>
                            <option value="Savings Account">Savings Account</option>
                            <option value="Loan Account">Loan / EMI Account</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Default Currency</label>
                        <select class="input-control" id="cfg-currency">
                            <option value="INR">INR (₹)</option>
                            <option value="USD">USD ($)</option>
                            <option value="EUR">EUR (€)</option>
                        </select>
                    </div>
                </div>
            </div>

            <button class="submit-btn" onclick="saveNewBankMaster()">Save Bank Master Configuration</button>
        </div>

        <!-- Right Panel: Registered Master Banks List -->
        <div class="panel-box">
            <div class="panel-title">📋 Configured System Banks</div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Bank & Holder</th>
                            <th>Acc No / Type</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="bank-matrix-rows">
                        <!-- Banks load live here -->
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        const systemDataBus = new BroadcastChannel('raghuveer_ai_core_bus');

        const userRole = sessionStorage.getItem('userRole') || localStorage.getItem('lastActiveRole');
        if(userRole !== 'director' && userRole !== 'accountant') {
            alert("ACCESS DENIED: Restricted to Director and Accountant level access.");
            window.location.href = "index.html";
        }

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {});
            } else {
                document.exitFullscreen().catch(err => {});
            }
        }

        function triggerMinimize() { alert("Terminal Minimized."); }

        function backToTerminal() {
            window.location.href = 'bank_details.html';
        }

        function saveNewBankMaster() {
            const name = document.getElementById('cfg-bank-name').value.trim();
            const holder = document.getElementById('cfg-holder-name').value.trim();
            const accNo = document.getElementById('cfg-acc-number').value.trim();
            const ifsc = document.getElementById('cfg-ifsc').value.trim();
            const type = document.getElementById('cfg-acc-type').value;
            const currency = document.getElementById('cfg-currency').value;

            if(!name || !holder || !accNo || !ifsc) {
                alert("Configuration Error: All parameters must be filled.");
                return;
            }

            /* Dual Sync: Write to factory_banks (Used by bank_details.html) */
            const factoryBanks = JSON.parse(localStorage.getItem('factory_banks')) || [];
            factoryBanks.push({ name, acc: accNo, ifsc, holder, type, balance: 0 });
            localStorage.setItem('factory_banks', JSON.stringify(factoryBanks));

            /* Write to master_banks */
            const masterBanks = JSON.parse(localStorage.getItem('master_banks')) || [];
            masterBanks.push({ name, holder, accNo, ifsc, type, currency });
            localStorage.setItem('master_banks', JSON.stringify(masterBanks));

            // Broadcast channel event dispatch for real-time UI refresh
            systemDataBus.postMessage({ type: "PRODUCTION_DATA_MUTATION", module: "bank_settings" });

            // Clear inputs
            document.getElementById('cfg-bank-name').value = '';
            document.getElementById('cfg-holder-name').value = '';
            document.getElementById('cfg-acc-number').value = '';
            document.getElementById('cfg-ifsc').value = '';

            loadMasterBanks();
            alert("⚡ Bank Configuration Saved Successfully.");
        }

        function loadMasterBanks() {
            const tbody = document.getElementById('bank-matrix-rows');
            const banks = JSON.parse(localStorage.getItem('master_banks')) || [];

            if(banks.length === 0) {
                tbody.innerHTML = `<tr><td colspan="3" style="text-align:center; color:var(--text-muted); padding: 20px;">No banks registered.</td></tr>`;
                return;
            }

            tbody.innerHTML = banks.map((b, index) => `
                <tr>
                    <td><strong>${b.name}</strong><br><small style="color:var(--text-muted);">${b.holder}</small></td>
                    <td>${b.accNo}<br><small style="color:var(--accent-cyan);">${b.type} (${b.currency})</small></td>
                    <td style="text-align:center;">
                        <button class="delete-btn" onclick="deleteBankMaster(${index})">🗑️</button>
                    </td>
                </tr>
            `).join('');
        }

        function deleteBankMaster(index) {
            if(confirm("Are you sure you want to remove this bank master profile?")) {
                const masterBanks = JSON.parse(localStorage.getItem('master_banks')) || [];
                const removedBank = masterBanks[index];
                masterBanks.splice(index, 1);
                localStorage.setItem('master_banks', JSON.stringify(masterBanks));

                /* Remove matching entry from factory_banks as well */
                if (removedBank) {
                    let factoryBanks = JSON.parse(localStorage.getItem('factory_banks')) || [];
                    factoryBanks = factoryBanks.filter(b => b.name !== removedBank.name);
                    localStorage.setItem('factory_banks', JSON.stringify(factoryBanks));
                }

                systemDataBus.postMessage({ type: "PRODUCTION_DATA_MUTATION", module: "bank_settings" });
                loadMasterBanks();
            }
        }
    </script>
</body>
</html>
