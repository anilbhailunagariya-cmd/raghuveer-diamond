<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Raghuveer Diamond - Purchase Core</title>
    <style>
        :root {
            --bg-primary: #070B19; 
            --bg-secondary: #0D1630; 
            --top-bar-bg: #030611; 
            --border-color: #1C2541; 
            --accent-cyan: #5BC0BE; 
            --accent-blue: #00C6FF; 
            --accent-green: #27AE60; 
            --accent-red: #E74C3C; 
            --accent-purple: #9B59B6;
            --text-main: #FFFFFF; 
            --text-muted: #708090; 
        }

        /* STRICT SCROLLBAR DISMISSAL */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; }
        body { background-color: var(--bg-primary); color: var(--text-main); width: 100vw; height: 100vh; display: flex; flex-direction: column; overflow: hidden !important; }
        ::-webkit-scrollbar { display: none !important; width: 0px !important; }

        /* Top Windows Control Architecture */
        .window-control-bar { height: 45px; background-color: var(--top-bar-bg); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; border-bottom: 2px solid var(--border-color); flex-shrink: 0; } 
        .brand-title { font-size: 14px; font-weight: 900; letter-spacing: 1px; color: var(--accent-cyan); text-transform: uppercase; } 
        .control-group { display: flex; gap: 8px; }
        .btn-win { width: 32px; height: 26px; border: none; border-radius: 4px; color: white; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; font-size: 14px; text-decoration: none; }
        .btn-min { background: #2C3E50; }
        .btn-max { background: #34495E; }
        .btn-close { background: var(--accent-red); }

        /* Fixed Row Layout: Forms, Logs, and then Sidebar on the Right Space */
        .workspace-grid { flex: 1; display: flex; flex-direction: row; gap: 15px; padding: 15px; overflow: hidden !important; justify-content: center; align-items: stretch; }
        
        .panel-box { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px; display: flex; flex-direction: column; box-shadow: 0 4px 15px rgba(0,0,0,0.4); height: 100%; overflow: hidden !important; }
        
        .form-panel { width: 950px; flex-shrink: 0; }
        .log-panel { width: 400px; flex-shrink: 0; }

        /* RIGHT CONTROL SIDEBAR - SECURED EXACTLY ON THE RIGHT SPACE */
        .right-control-tower { width: 130px; display: flex; flex-direction: column; gap: 15px; justify-content: center; align-items: stretch; flex-shrink: 0; height: 100%; }
        .tower-btn { background: #16213E; color: #FFF; padding: 18px 5px; font-size: 11px; border-radius: 10px; border: 1px solid var(--accent-cyan); cursor: pointer; font-weight: 800; text-transform: uppercase; transition: all 0.2s ease; letter-spacing: 0.5px; text-align: center; }
        .tower-btn:hover { border-color: var(--accent-blue); background: #1A2F56; color: var(--accent-cyan); }
        .tower-btn-export { background: var(--accent-green); color: white; border: 1px solid var(--accent-green); }
        .tower-btn-export:hover { background: #219653; color: white; }

        /* Responsive Layout Overrides ONLY for Actual Mobile Screens */
        @media (max-width: 1520px) {
            body { overflow-y: auto !important; }
            .workspace-grid { flex-direction: column; height: auto; overflow: visible !important; align-items: center; justify-content: flex-start; }
            .panel-box { width: 100%; max-width: 950px; height: auto; }
            .right-control-tower { width: 100%; max-width: 950px; flex-direction: row; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 5px; margin-bottom: 20px; height: auto; }
        }

        /* Wide Form Matrix Configuration */
        .form-container-grid { display: flex; flex-direction: column; gap: 14px; }
        .form-row-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        @media (max-width: 768px) {
            .form-row-3, .form-row-2 { grid-template-columns: 1fr; gap: 12px; }
        }

        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .input-group label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px; }
        .input-control { background: #070B19; border: 1px solid var(--border-color); color: var(--accent-cyan); padding: 10px; border-radius: 6px; font-size: 13px; font-weight: bold; outline: none; width: 100%; }
        .input-control:focus { border-color: var(--accent-blue); }
        .input-row { display: flex; gap: 6px; }
        .plus-btn { background: #16213E; color: var(--accent-cyan); border: 1px solid var(--border-color); width: 38px; cursor: pointer; border-radius: 6px; font-weight: bold; font-size: 16px; display: flex; align-items: center; justify-content: center; }
        .plus-btn:hover { background: var(--accent-cyan); color: #030611; }

        .file-label { background: #16213E; color: white; border: 1px dashed var(--accent-cyan); padding: 10px; border-radius: 6px; text-align: center; cursor: pointer; font-size: 12px; font-weight: bold; text-transform: uppercase; display: block; }
        .file-label:hover { background: rgba(91, 192, 190, 0.1); }

        .submit-btn { background: var(--accent-cyan); color: #030611; padding: 14px; border: none; border-radius: 8px; font-weight: 800; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; font-size: 13px; box-shadow: 0 4px 12px rgba(91,192,190,0.3); width: 100%; margin-top: 5px; }
        .submit-btn:hover { background: var(--accent-blue); color: #FFFFFF; }
        .hidden { display: none !important; }
        .invisible { visibility: hidden !important; }

        /* Filter Controls */
        .filter-control-row { display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px; }
        .filter-search-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .filter-input { background: #070B19; border: 1px solid var(--border-color); color: var(--accent-cyan); padding: 8px 12px; border-radius: 6px; font-size: 12px; outline: none; font-weight: bold; width: 100%; }

        /* Table Configuration */
        .table-wrapper { flex: 1; overflow-y: auto !important; border: 1px solid var(--border-color); border-radius: 6px; background: #070B19; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: #16213E; color: var(--accent-cyan); padding: 12px 8px; text-transform: uppercase; font-size: 11px; font-weight: 700; text-align: left; position: sticky; top: 0; z-index: 10; border-bottom: 2px solid var(--border-color); }
        td { padding: 12px 8px; border-bottom: 1px solid var(--border-color); color: #FFFFFF; vertical-align: middle; }
        .tr-row:hover { background: rgba(28, 37, 65, 0.3); }

        .alert-safe { color: #2ECC71; font-weight: bold; font-size: 11px; }
        .alert-warning { color: #F39C12; font-weight: bold; font-size: 11px; }
        .alert-danger { color: #E74C3C; font-weight: bold; font-size: 11px; }

        /* Photo Preview Modal Overlay */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(3, 6, 17, 0.9); display: flex; align-items: center; justify-content: center; z-index: 2000; display: none; }
        .modal-box { background: #0B132B; border: 1px solid var(--accent-cyan); border-radius: 12px; padding: 15px; max-width: 90%; max-height: 90%; display: flex; flex-direction: column; align-items: center; }
        .modal-box img { max-width: 100%; max-height: 70vh; object-fit: contain; border-radius: 6px; margin-bottom: 10px; }
    </style> 
</head>
<body onload="initPurchaseCore()">

    <!-- Top Window bar Architecture -->
    <div class="window-control-bar"> 
        <div class="brand-title">RAGHUVEER DIAMOND</div> 
        <div class="control-group">
            <button class="btn-win btn-min" onclick="alert('Terminal Minimized')">-</button>
            <button class="btn-win btn-max" onclick="toggleFullScreen()">□</button>
            <a href="main_office.html" class="btn-win btn-close">✕</a>
        </div>
    </div>

    <!-- Main Workspace Splitter -->
    <div class="workspace-grid">
        
        <!-- Left Column: Entry Engine (950px Wide Screen Grid) -->
        <div class="panel-box form-panel">
            <div class="form-container-grid">
                <!-- Row 1: Lot, Intake Date, Vendor Entity -->
                <div class="form-row-3">
                    <div class="input-group"><label>Lot No</label><input type="text" id="lot" class="input-control" placeholder="e.g. RF-101"></div>
                    <div class="input-group"><label>Intake Date</label><input type="date" id="date" class="input-control"></div>
                    <div class="input-group">
                        <label>Vendor Entity</label>
                        <div class="input-row">
                            <select id="vendor" class="input-control"><option value="">-- Select Vendor --</option></select>
                            <button class="plus-btn" onclick="addEntry('rp_vendors', 'vendor')">+</button>
                        </div>
                    </div>
                </div>

                <!-- Row 2: Purchase Stream, Payment Mode, Broker Targets -->
                <div class="form-row-3">
                    <div class="input-group">
                        <label>Purchase Stream</label>
                        <select id="stream" class="input-control" onchange="toggleBrokerBlock()">
                            <option value="direct">Direct Account</option>
                            <option value="broker">Via Broker</option>
                        </select>
                    </div>
                    <div class="input-group"><label>Payment Mode Source</label>
                        <select id="pay-source" class="input-control">
                            <option value="CASH">OFFICE CASH COUNTER</option>
                            <option value="BANK">CONNECTED BANK CHANNEL</option>
                        </select>
                    </div>
                    <!-- Conditional Broker Target block -->
                    <div id="broker-target-group" class="input-group hidden"><label>Broker Target</label>
                        <div class="input-row">
                            <select id="broker" class="input-control"><option value="">-- Select Broker --</option></select>
                            <button class="plus-btn" onclick="addEntry('rp_brokers', 'broker')">+</button>
                        </div>
                    </div>
                    <div id="broker-placeholder" class="input-group"></div>
                </div>

                <!-- Row 3: Weight, Price, Brokerage -->
                <div class="form-row-3">
                    <div class="input-group"><label>Weight (Carats)</label><input type="number" step="0.01" id="weight" class="input-control" placeholder="0.00" oninput="calculateTotalAmount()"></div>
                    <div class="input-group"><label>Price / Carat (₹)</label><input type="number" step="0.01" id="price" class="input-control" placeholder="0.00" oninput="calculateTotalAmount()"></div>
                    <div id="broker-pct-group" class="input-group invisible" style="opacity: 0;"><label>Brokerage (%)</label><input type="number" id="broker-pct" class="input-control" placeholder="0.00" oninput="calculateTotalAmount()"></div>
                </div>

                <!-- Row 4: Tax Structure, Due Target Date, Bill Photo -->
                <div class="form-row-3">
                    <div class="input-group"><label>Tax Structure Class</label>
                        <div class="input-row">
                            <select id="tax" class="input-control" onchange="calculateTotalAmount()"></select>
                            <button class="plus-btn" onclick="addCustomTaxRate()">+</button>
                        </div>
                    </div>
                    <div class="input-group"><label>Due Target Date</label><input type="date" id="due-date" class="input-control"></div>
                    <div class="input-group">
                        <label>Attach Bill Invoice Photo</label>
                        <label for="bill-photo" class="file-label" id="file-label-text">📷 Capture / Upload Bill</label>
                        <input type="file" id="bill-photo" accept="image/*" class="hidden" onchange="processBillImage(this)">
                    </div>
                </div>

                <!-- Row 5: Valuation and Commit Button -->
                <div class="form-row-2" style="align-items: flex-end;">
                    <div class="input-group">
                        <label style="color: var(--accent-blue); font-weight: bold;">Net Payable Valuation (₹)</label>
                        <input type="text" id="net-payable" class="input-control" readonly style="color: var(--accent-blue); font-size: 16px; background: #030611; border-color: var(--accent-blue);" placeholder="0.00">
                    </div>
                    <button class="submit-btn" onclick="savePurchaseRecord()">Commit Purchase to Ledger</button>
                </div>
            </div>
        </div>

        <!-- Middle Column: Realtime History Database (400px Wide Screen Panel) -->
        <div class="panel-box log-panel">
            <div class="filter-control-row">
                <div class="filter-search-group">
                    <input type="text" class="filter-input" id="search-party" placeholder="Search Vendor..." oninput="refreshPurchaseHistoryTable()">
                    <input type="date" class="filter-input" id="search-date" onchange="refreshPurchaseHistoryTable()">
                </div>
            </div>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Lot No</th>
                            <th>Date / Status</th>
                            <th>Vendor Details</th>
                            <th>Total (₹)</th>
                        </tr>
                    </thead>
                    <tbody id="purchase-history-rows"></tbody>
                </table>
            </div>
        </div>

        <!-- Right Column Sidebar: 4 Buttons Permanently Pushed to the Rightmost Side Space -->
        <div class="right-control-tower">
            <button class="tower-btn" onclick="triggerAiVoice()">🎤 VOICE</button>
            <button class="tower-btn" onclick="triggerAiScan()">📸 SCAN</button>
            <button class="tower-btn" onclick="triggerAiYield()">📈 YIELD</button>
            <button class="tower-btn tower-btn-export" onclick="exportPurchaseLedgerToCSV()">📥 EXPORT SHEET</button>
        </div>

    </div>

    <!-- Image Preview Lightbox Modal -->
    <div class="modal-overlay" id="image-modal" onclick="closeImageModal()">
        <div class="modal-box" onclick="event.stopPropagation()">
            <img id="modal-img-src" src="" alt="Bill Preview">
            <button class="tower-btn" style="width:100px; border-color:var(--accent-red); color:white; background:var(--accent-red);" onclick="closeImageModal()">Close</button>
        </div>
    </div>

    <script>
        let attachedImageBase64 = "";

        function initPurchaseCore() {
            document.getElementById('date').valueAsDate = new Date();
            
            if(!localStorage.getItem('purchase_history_log')) localStorage.setItem('purchase_history_log', JSON.stringify([]));
            if(!localStorage.getItem('total_rough')) localStorage.setItem('total_rough', '0');
            if(!localStorage.getItem('cash_on_hand')) localStorage.setItem('cash_on_hand', '0');
            if(!localStorage.getItem('cash_history_log')) localStorage.setItem('cash_history_log', JSON.stringify([]));

            renderDropdown('rp_vendors', 'vendor');
            renderDropdown('rp_brokers', 'broker');
            renderTaxDropdown();
            refreshPurchaseHistoryTable();
        }

        function toggleBrokerBlock() {
            let stream = document.getElementById('stream').value;
            let targetGroup = document.getElementById('broker-target-group');
            let placeholder = document.getElementById('broker-placeholder');
            let pctGroup = document.getElementById('broker-pct-group');

            if(stream === 'broker') {
                targetGroup.classList.remove('hidden');
                placeholder.classList.add('hidden');
                pctGroup.style.opacity = "1";
                pctGroup.classList.remove('invisible');
            } else {
                targetGroup.classList.add('hidden');
                placeholder.classList.remove('hidden');
                pctGroup.style.opacity = "0";
                pctGroup.classList.add('invisible');
                document.getElementById('broker-pct').value = '';
                calculateTotalAmount();
            }
        }

        function processBillImage(input) {
            if (input.files && input.files[0]) {
                let reader = new FileReader();
                reader.onload = function(e) {
                    attachedImageBase64 = e.target.result;
                    document.getElementById('file-label-text').innerText = "✅ Bill Attached";
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function viewAttachedBill(index) {
            let logs = JSON.parse(localStorage.getItem('purchase_history_log')) || [];
            if(logs[index] && logs[index].billImage) {
                document.getElementById('modal-img-src').src = logs[index].billImage;
                document.getElementById('image-modal').style.display = 'flex';
            } else {
                alert("No bill photo attached to this specific lot.");
            }
        }

        function closeImageModal() {
            document.getElementById('image-modal').style.display = 'none';
        }

        function addEntry(storageKey, selectId) {
            let val = prompt("Enter Entity / Person Name:");
            if(val && val.trim() !== "") {
                let list = JSON.parse(localStorage.getItem(storageKey)) || [];
                if(!list.includes(val.trim())) {
                    list.push(val.trim());
                    localStorage.setItem(storageKey, JSON.stringify(list));
                    renderDropdown(storageKey, selectId);
                    document.getElementById(selectId).value = val.trim();
                }
            }
        }

        function addCustomTaxRate() {
            let label = prompt("Enter Custom Tax Label (e.g. GST Local):");
            let rate = prompt("Enter Tax Percentage Factor (e.g. 0.25):");
            if(label && rate) {
                let taxes = JSON.parse(localStorage.getItem('rp_taxes')) || [];
                taxes.push({name: `${label} (${rate}%)`, rate: parseFloat(rate)});
                localStorage.setItem('rp_taxes', JSON.stringify(taxes));
                renderTaxDropdown();
                document.getElementById('tax').value = parseFloat(rate);
                calculateTotalAmount();
            }
        }

        function renderDropdown(key, id) {
            let list = JSON.parse(localStorage.getItem(key)) || [];
            let el = document.getElementById(id);
            let fallText = id === 'vendor' ? 'Vendor' : 'Broker';
            el.innerHTML = `<option value="">-- Select ${fallText} --</option>`;
            list.forEach(item => el.innerHTML += `<option value="${item}">${item}</option>`);
        }

        function renderTaxDropdown() {
            let taxes = JSON.parse(localStorage.getItem('rp_taxes')) || [
                {name: "Exempted Matrix (0%)", rate: 0},
                {name: "GST Rough Intake (0.25%)", rate: 0.25},
                {name: "GST Inward Standard (1.5%)", rate: 1.5}
            ];
            localStorage.setItem('rp_taxes', JSON.stringify(taxes));
            let el = document.getElementById('tax');
            el.innerHTML = '';
            taxes.forEach(t => el.innerHTML += `<option value="${t.rate}">${t.name}</option>`);
        }

        function calculateTotalAmount() {
            let weight = parseFloat(document.getElementById('weight').value) || 0;
            let price = parseFloat(document.getElementById('price').value) || 0;
            let base = weight * price;

            let brokerage = 0;
            if(document.getElementById('stream').value === 'broker') {
                let bPct = parseFloat(document.getElementById('broker-pct').value) || 0;
                brokerage = (base * bPct) / 100;
            }

            let tPct = parseFloat(document.getElementById('tax').value) || 0;
            let tax = (base * tPct) / 100;

            let finalVal = base + brokerage + tax;
            document.getElementById('net-payable').value = finalVal.toFixed(2);
            return finalVal;
        }

        function refreshPurchaseHistoryTable() {
            let logs = JSON.parse(localStorage.getItem('purchase_history_log')) || [];
            let tbody = document.getElementById('purchase-history-rows');
            tbody.innerHTML = '';

            let searchParty = document.getElementById('search-party').value.toLowerCase().trim();
            let searchDate = document.getElementById('search-date').value; 
            if (searchDate) {
                let parts = searchDate.split('-');
                searchDate = `${parts[2]}/${parts[1]}/${parts[0]}`; 
            }

            let filteredLogs = logs.filter(item => {
                let matchParty = !searchParty || item.vendor.toLowerCase().includes(searchParty);
                let matchDate = !searchDate || item.date === searchDate;
                return matchParty && matchDate;
            });

            if(filteredLogs.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:var(--text-muted); padding:30px;">Empty Logs</td></tr>`;
                return;
            }

            filteredLogs.reverse().forEach((log) => {
                let origIndex = logs.findIndex(l => l.lot === log.lot);
                let dueStatusHtml = `<br><span class="alert-safe">Paid Source</span>`;
                
                if(log.dueDate) {
                    let today = new Date();
                    today.setHours(0,0,0,0);
                    let parts = log.dueDate.split('/');
                    let dueObj = new Date(parts[2], parts[1]-1, parts[0]);
                    
                    let diffTime = dueObj - today;
                    let diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

                    if(diffDays > 0) {
                        dueStatusHtml = `<br><span class="alert-warning">⏳ ${diffDays} days left</span>`;
                    } else if(diffDays === 0) {
                        dueStatusHtml = `<br><span class="alert-danger">🚨 Due Today</span>`;
                    } else {
                        dueStatusHtml = `<br><span class="alert-danger">⚠️ Overdue ${Math.abs(diffDays)}d</span>`;
                    }
                }

                let cameraIcon = log.billImage ? `<span style="cursor:pointer; margin-left:4px;" onclick="viewAttachedBill(${origIndex})">🖼️</span>` : "";

                tbody.innerHTML += `
                    <tr class="tr-row">
                        <td style="color:var(--accent-blue); font-weight:bold;">${log.lot} ${cameraIcon}</td>
                        <td style="color:var(--text-muted); font-size:11px;">${log.date} ${dueStatusHtml}</td>
                        <td><strong>${log.vendor}</strong><br><small style="color:var(--text-muted); font-size:11px;">${log.carat} Cts</small></td>
                        <td style="color:var(--accent-cyan); font-weight:bold;">₹${Math.round(log.netPayable).toLocaleString('en-IN')}</td>
                    </tr>
                `;
            });
        }

        function savePurchaseRecord() {
            let lot = document.getElementById('lot').value.trim();
            let dateInput = document.getElementById('date').value;
            let dueDateInput = document.getElementById('due-date').value;
            let vendor = document.getElementById('vendor').value;
            let source = document.getElementById('pay-source').value;
            let carat = parseFloat(document.getElementById('weight').value) || 0;
            let price = parseFloat(document.getElementById('price').value) || 0;
            let netPayable = calculateTotalAmount();

            if(!lot || !dateInput || !vendor || carat <= 0 || price <= 0) {
                alert("Validation Check Failure: Missing Mandatory parameters!");
                return;
            }

            let dParts = dateInput.split('-');
            let dateStr = `${dParts[2]}/${dParts[1]}/${dParts[0]}`;

            let dueDateStr = "";
            if(dueDateInput) {
                let ddParts = dueDateInput.split('-');
                dueDateStr = `${ddParts[2]}/${ddParts[1]}/${ddParts[0]}`;
            }

            if(source === 'CASH') {
                let currentCash = parseFloat(localStorage.getItem('cash_on_hand')) || 0;
                if(netPayable > currentCash) {
                    if(!confirm("Warning Matrix Check: Payable exceeds cash vault inventory threshold. Proceed?")) return;
                }
                currentCash -= netPayable;
                localStorage.setItem('cash_on_hand', currentCash.toString());

                let cashHistory = JSON.parse(localStorage.getItem('cash_history_log')) || [];
                cashHistory.push({ date: dateStr, party: vendor, purpose: `Rough Intake Lot: ${lot}`, amount: netPayable, type: 'javak' });
                localStorage.setItem('cash_history_log', JSON.stringify(cashHistory));
            } else {
                let banks = JSON.parse(localStorage.getItem('factory_banks')) || [];
                if(banks.length === 0) {
                    alert("Sync Aborted: No connected bank account found inside system structure!");
                    return;
                }
                banks[0].balance -= netPayable;
                localStorage.setItem('factory_banks', JSON.stringify(banks));

                let bankLedger = JSON.parse(localStorage.getItem('bank_ledger_logs')) || [];
                bankLedger.unshift({ bank: banks[0].name, method: 'WIRE_TRANSFER', purpose: `Rough Intake Lot: ${lot}`, party: vendor, amount: netPayable, mode: 'DEBIT' });
                localStorage.setItem('bank_ledger_logs', JSON.stringify(bankLedger));
            }

            let currentStock = parseFloat(localStorage.getItem('total_rough')) || 0;
            localStorage.setItem('total_rough', (currentStock + carat).toString());

            let purchases = JSON.parse(localStorage.getItem('purchase_history_log')) || [];
            purchases.push({
                lot: lot,
                date: dateStr,
                dueDate: dueDateStr,
                vendor: vendor,
                stream: document.getElementById('stream').value,
                broker: document.getElementById('broker').value,
                carat: carat,
                netPayable: netPayable,
                billImage: attachedImageBase64
            });
            localStorage.setItem('purchase_history_log', JSON.stringify(purchases));

            document.getElementById('lot').value = '';
            document.getElementById('weight').value = '';
            document.getElementById('price').value = '';
            document.getElementById('broker-pct').value = '';
            document.getElementById('due-date').value = '';
            document.getElementById('bill-photo').value = '';
            attachedImageBase64 = "";
            document.getElementById('file-label-text').innerText = "📷 Capture / Upload Bill";
            document.getElementById('net-payable').value = '0.00';
            
            alert(`⚡ System Confirmed: Procurement Lot ${lot} Integrated Successfully!`);
            refreshPurchaseHistoryTable();
        }

        function exportPurchaseLedgerToCSV() {
            let history = JSON.parse(localStorage.getItem('purchase_history_log')) || [];
            if(history.length === 0) { alert("Data Empty to export!"); return; }

            let csvRows = ['Lot No,Date,Vendor Details,Weight (Carats),Total Amount (INR)'];
            history.forEach(h => {
                csvRows.push(`"${h.lot}","${h.date}","${h.vendor} (${h.stream})","${h.carat}","${h.netPayable}"`);
            });

            let blob = new Blob([csvRows.join('\n')], { type: 'text/csv;charset=utf-8;' });
            let link = document.createElement("a");
            let url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            link.setAttribute("download", `Raghuveer_Purchase_Report.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function triggerAiScan() { alert("RA-AI Invoice Optical Scanner Initializing..."); }
        function triggerAiYield() { alert("RA-AI Diagnostics: Target calculation yields 31.8% VVS polish outcome."); }

        function toggleFullScreen() {
            if (!document.fullscreenElement) { document.documentElement.requestFullscreen().catch(e=>{}); } 
            else { document.exitFullscreen(); }
        }
    </script>
