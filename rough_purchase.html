<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Raghuveer Diamond - Cash Flow Terminal</title>
    <style>
        /* ========================================================
           GLOBAL CENTRALIZED THEME VARIABLES (SYNCED WITH INDEX.HTML)
           ======================================================== */
        :root {
            --bg-primary: #070B19; 
            --bg-secondary: #111D37; 
            --top-bar-bg: #030611; 
            --border-color: #1C2541; 
            --accent-cyan: #5BC0BE; 
            --accent-blue: #00C6FF; 
            --accent-green: #2ECC71; 
            --accent-red: #E74C3C; 
            --accent-purple: #9B59B6;
            --text-main: #FFFFFF; 
            --text-muted: #8D99AE; 
            --font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font-family); user-select: none; }
        body { background-color: var(--bg-primary); color: var(--text-main); width: 100vw; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Window Control Bar Architecture */
        .window-control-bar { height: 48px; background-color: var(--top-bar-bg); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; border-bottom: 1px solid var(--border-color); } 
        .brand-title { font-size: 14px; font-weight: 900; letter-spacing: 1.5px; color: var(--accent-cyan); text-transform: uppercase; } 
        .control-group { display: flex; gap: 8px; }
        .btn-win { width: 32px; height: 26px; border: none; border-radius: 4px; color: white; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; font-size: 14px; text-decoration: none; }
        .btn-min { background: #1C2541; }
        .btn-max { background: #2A365C; }
        .btn-close { background: var(--accent-red); }

        /* Balance Board Grid */
        .balance-board { 
            display: grid; 
            grid-template-columns: repeat(1, 1fr); 
            gap: 12px; 
            padding: 12px; 
            width: 100%;
        } 
        @media (min-width: 768px) { 
            .balance-board { grid-template-columns: repeat(4, 1fr); gap: 15px; padding: 15px; } 
        }

        .balance-card { 
            background: var(--bg-secondary); 
            border: 1px solid var(--border-color); 
            border-radius: 12px; 
            padding: 0; 
            position: relative; 
            overflow: hidden; 
            aspect-ratio: 2.3 / 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            transition: all 0.3s ease;
            cursor: pointer;
        } 
        .balance-card:hover { border-color: var(--accent-cyan); box-shadow: 0 0 15px rgba(91, 192, 190, 0.3); transform: translateY(-2px); }
        .balance-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; } 

        #card-cash-vault::before { background: var(--accent-blue); }
        #card-cash-in::before { background: var(--accent-green); }
        #card-cash-out::before { background: var(--accent-red); }
        #card-bank-link::before { background: var(--accent-purple); }

        .marquee-strip-container { width: 100%; background: #030611; border-bottom: 1px solid var(--border-color); padding: 8px 10px; min-height: 32px; display: flex; align-items: center; justify-content: center; }
        .marquee-strip { font-size: 12px; font-weight: 800; color: var(--accent-cyan); text-transform: uppercase; letter-spacing: 1px; }

        .card-content-wrapper { flex: 1; display: flex; justify-content: center; align-items: center; padding: 5px; }
        .card-val { font-size: 20px; font-weight: 800; color: #FFFFFF; text-align: center; } 

        /* Filter Controls Row */
        .filter-control-row { display: flex; flex-wrap: wrap; gap: 10px; padding: 0 12px; margin-bottom: 10px; align-items: center; }
        @media (min-width: 768px) { .filter-control-row { padding: 0 15px; } }
        .filter-input { background: var(--bg-secondary); border: 1px solid var(--border-color); color: var(--accent-cyan); padding: 8px 12px; border-radius: 6px; font-size: 12px; outline: none; font-weight: bold; }
        .filter-input::placeholder { color: var(--text-muted); }
        .export-btn { background: var(--accent-green); color: white; border: none; padding: 8px 15px; border-radius: 6px; font-size: 12px; font-weight: 800; cursor: pointer; text-transform: uppercase; margin-left: auto; transition: 0.3s; }
        .export-btn:hover { opacity: 0.9; box-shadow: 0 0 12px rgba(46, 204, 113, 0.4); }

        /* Workspace Ledger Core */
        .cash-workspace { 
            flex: 1; 
            padding: 0 12px 12px 12px; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        } 
        @media (min-width: 768px) { 
            .cash-workspace { padding: 0 15px 15px 15px; height: calc(100vh - 210px); } 
        }

        .panel-box { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 12px; padding: 15px; display: flex; flex-direction: column; box-shadow: 0 4px 15px rgba(0,0,0,0.4); flex: 1; overflow: hidden; } 
        .panel-title { font-size: 13px; color: var(--accent-cyan); text-transform: uppercase; margin-bottom: 12px; font-weight: 700; border-bottom: 1px dashed var(--border-color); padding-bottom: 8px; letter-spacing: 1px; } 

        .table-wrapper { flex: 1; overflow-y: auto; border: 1px solid var(--border-color); border-radius: 6px; background: #070B19; } 
        table { width: 100%; border-collapse: collapse; font-size: 13px; } 
        th { background: #111D37; color: var(--accent-cyan); padding: 12px 10px; text-transform: uppercase; font-size: 11px; font-weight: 700; text-align: left; position: sticky; top: 0; border-bottom: 1px solid var(--border-color); } 
        td { padding: 12px 10px; border-bottom: 1px solid var(--border-color); color: #FFFFFF; } 
        .tx-cr { color: var(--accent-green); font-weight: 700; } 
        .tx-dr { color: var(--accent-red); font-weight: 700; } 
        .tx-tr { color: var(--accent-purple); font-weight: 700; }

        /* Modals Matrix */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(7, 11, 25, 0.88); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 2000; display: none; } 
        .modal-box { background: #111D37; border: 1px solid var(--border-color); border-radius: 12px; width: 95%; max-width: 750px; padding: 25px; box-shadow: 0 0 35px rgba(0, 0, 0, 0.8); } 

        .form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 12px; } 
        .input-group { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; } 
        .input-group label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px; } 
        .input-control { background: #070B19; border: 1px solid var(--border-color); color: var(--accent-cyan); padding: 10px; border-radius: 6px; font-size: 13px; font-weight: bold; outline: none; width: 100%; } 
        .input-control:focus { border-color: var(--accent-cyan); }
        .mode-btn { width: 100%; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: 800; text-transform: uppercase; text-align: center; border: none; font-size: 12px; letter-spacing: 1px; color: var(--bg-primary); background: var(--accent-cyan); margin-top: 5px; transition: 0.3s; } 
        .mode-btn:hover { opacity: 0.9; box-shadow: 0 0 15px rgba(255, 255, 255, 0.2); }
    </style> 
</head>
<body onload="initCashFlowCore()">

    <!-- Top Navigation Bar -->
    <div class="window-control-bar"> 
        <div class="brand-title">RAGHUVEER DIAMOND - CASH FLOW TERMINAL</div> 
        <div class="control-group">
            <button class="btn-win btn-min" onclick="triggerMinimize()">-</button>
            <button class="btn-win btn-max" onclick="toggleFullScreen()">🗖</button>
            <a href="main_office.html" class="btn-win btn-close">✕</a>
        </div>
    </div>

    <!-- Data Cards Grid -->
    <div class="balance-board"> 
        <div class="balance-card" id="card-cash-vault"><div class="marquee-strip-container"><div class="marquee-strip">CASH ON HAND</div></div><div class="card-content-wrapper"><div class="card-val" id="val-cash-vault">₹ 0</div></div></div>
        <div class="balance-card" id="card-cash-in" onclick="openPopup('cash-in-modal')"><div class="marquee-strip-container"><div class="marquee-strip">CASH IN TRAFFIC</div></div><div class="card-content-wrapper"><div class="card-val" id="val-cash-in">₹ 0</div></div></div>
        <div class="balance-card" id="card-cash-out" onclick="openPopup('cash-out-modal')"><div class="marquee-strip-container"><div class="marquee-strip">CASHOUT FLOW</div></div><div class="card-content-wrapper"><div class="card-val" id="val-cash-out">₹ 0</div></div></div>
        <div class="balance-card" id="card-bank-link" onclick="openPopup('bank-link-modal')"><div class="marquee-strip-container"><div class="marquee-strip">BANK LINK WIRE</div></div><div class="card-content-wrapper"><div class="card-val">⇄ BANK LINK</div></div></div>
    </div> 

    <!-- Search & Export Controls -->
    <div class="filter-control-row">
        <input type="text" class="filter-input" id="search-party" placeholder="Search by Party..." oninput="refreshCashDashboard()">
        <input type="date" class="filter-input" id="search-date" onchange="refreshCashDashboard()">
        <button class="export-btn" onclick="exportLedgerToCSV()">📥 Export Sheet</button>
    </div>

    <!-- Ledger Workspace -->
    <div class="cash-workspace"> 
        <div class="panel-box"> 
            <div class="panel-title">Live Cash Ledger Database</div> 
            <div class="table-wrapper"> 
                <table>
                    <thead>
                        <tr>
                            <th>Timestamp</th>
                            <th>Operational Details</th>
                            <th>Amount Flow</th>
                        </tr>
                    </thead>
                    <tbody id="ledger-rows"></tbody>
                </table> 
            </div> 
        </div> 
    </div>

    <!-- 🟢 1. CASH IN MODAL -->
    <div class="modal-overlay" id="cash-in-modal" onclick="closePopup('cash-in-modal', event)">
        <div class="modal-box" onclick="event.stopPropagation()">
            <div class="panel-title" style="border:none; margin-bottom:15px; display:flex; justify-content:space-between;"> <span>🟢 Cash In Matrix</span> <span style="cursor:pointer;" onclick="hidePopupDirect('cash-in-modal')">✕</span> </div>
            
            <div class="form-grid-2">
                <div class="input-group">
                    <label>Purpose</label>
                    <select class="input-control" id="in-purpose" onchange="toggleCustomInPurpose(this.value)">
                        <option value="Brokerage Income">Brokerage Income</option>
                        <option value="Rough Counter Cash">Rough Counter Cash</option>
                        <option value="Office Advance Return">Office Advance Return</option>
                        <option value="Other">Other / Custom Purpose</option>
                    </select>
                </div>
                <div class="input-group"><label>Amount (₹)</label><input type="number" class="input-control" id="in-amount" placeholder="0.00"></div>
            </div>

            <div class="input-group" id="custom-in-purpose-wrapper" style="display: none; margin-bottom: 12px;">
                <label style="color: var(--accent-green);">Enter Custom Purpose</label>
                <input type="text" class="input-control" id="in-custom-purpose" placeholder="e.g. Personal Capital Injection">
            </div>

            <div class="input-group">
                <label>Received From (Party Name)</label>
                <input type="text" class="input-control" id="in-party" placeholder="Enter Entity Name">
            </div>

            <button class="mode-btn" style="background:var(--accent-green); color:white;" onclick="executeCashTransaction('jama')">Confirm Cash In</button>
        </div>
    </div>

    <!-- 🔴 2. CASH OUT MODAL -->
    <div class="modal-overlay" id="cash-out-modal" onclick="closePopup('cash-out-modal', event)">
        <div class="modal-box" onclick="event.stopPropagation()">
            <div class="panel-title" style="border:none; margin-bottom:15px; display:flex; justify-content:space-between;"> <span>🔴 Cash Out Matrix</span> <span style="cursor:pointer;" onclick="hidePopupDirect('cash-out-modal')">✕</span> </div>
            
            <div class="form-grid-2">
                <div class="input-group">
                    <label>Expense Purpose</label>
                    <select class="input-control" id="out-purpose" onchange="toggleCustomOutPurpose(this.value)">
                        <option value="Factory Wages">Factory Wages</option>
                        <option value="Office Refreshments">Office Refreshments</option>
                        <option value="Stationery Expenses">Stationery Expenses</option>
                        <option value="Daily Labor Payout">Daily Labor Payout</option>
                        <option value="Other">Other / Custom Purpose</option>
                    </select>
                </div>
                <div class="input-group"><label>Amount (₹)</label><input type="number" class="input-control" id="out-amount" placeholder="0.00"></div>
            </div>

            <div class="input-group" id="custom-out-purpose-wrapper" style="display: none; margin-bottom: 12px;">
                <label style="color: var(--accent-red);">Enter Custom Purpose</label>
                <input type="text" class="input-control" id="out-custom-purpose" placeholder="e.g. Machine Oil Purchase">
            </div>

            <div class="input-group">
                <label>Paid To (Party / Person)</label>
                <input type="text" class="input-control" id="out-party" placeholder="Enter Entity Name">
            </div>

            <button class="mode-btn" style="background:var(--accent-red); color:white;" onclick="executeCashTransaction('javak')">Confirm Cash Out</button>
        </div>
    </div>

    <!-- 🟣 3. BANK LINK MODAL -->
    <div class="modal-overlay" id="bank-link-modal" onclick="closePopup('bank-link-modal', event)">
        <div class="modal-box" onclick="event.stopPropagation()">
            <div class="panel-title" style="border:none; margin-bottom:15px; display:flex; justify-content:space-between;"> <span>🟣 Bank Link Wire Protocol</span> <span style="cursor:pointer;" onclick="hidePopupDirect('bank-link-modal')">✕</span> </div>
            
            <div class="form-grid-2">
                <div class="input-group">
                    <label>Operation Direction</label>
                    <select class="input-control" id="bl-direction">
                        <option value="B2C">Bank To Cash (Withdrawal)</option>
                        <option value="C2B">Cash To Bank (Deposit)</option>
                    </select>
                </div>
                <div class="input-group"><label>Linked Bank Target</label><select class="input-control" id="bl-bank-select"></select></div>
            </div>

            <div class="form-grid-2">
                <div class="input-group"><label>Amount (₹)</label><input type="number" class="input-control" id="bl-amount" placeholder="0.00"></div>
                <div class="input-group">
                    <label>Transfer Method</label>
                    <select class="input-control" id="bl-method">
                        <option value="COUNTER_CASH">COUNTER CASH</option>
                        <option value="CHIEF_VOUCHER">CHIEF VOUCHER</option>
                    </select>
                </div>
            </div>

            <button class="mode-btn" style="background:var(--accent-purple); color:white;" onclick="executeBankLinkTransaction()">Execute Bank Link Wire</button>
        </div>
    </div>

    <script>
        const systemDataBus = new BroadcastChannel('raghuveer_ai_core_bus');

        const userRole = sessionStorage.getItem('userRole') || localStorage.getItem('lastActiveRole');
        if(userRole !== 'director' && userRole !== 'accountant') {
            alert("ACCESS DENIED: Restricted to Director and Accountant levels.");
            window.location.href = "index.html";
        }

        function toggleFullScreen() { 
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(e => {});
            } else {
                document.exitFullscreen().catch(e => {});
            }
        }
        function triggerMinimize() { alert("Terminal view minimized."); }

        function openPopup(id) { document.getElementById(id).style.display = 'flex'; }
        function closePopup(id, e) { if(e.target.id === id) hidePopupDirect(id); }
        function hidePopupDirect(id) {
            document.getElementById(id).style.display = 'none';
            if(id === 'cash-in-modal') document.getElementById('custom-in-purpose-wrapper').style.display = 'none';
            if(id === 'cash-out-modal') document.getElementById('custom-out-purpose-wrapper').style.display = 'none';
        }

        function toggleCustomInPurpose(val) {
            const wrapper = document.getElementById('custom-in-purpose-wrapper');
            wrapper.style.display = val === 'Other' ? 'flex' : 'none';
            if(val === 'Other') document.getElementById('in-custom-purpose').focus();
        }

        function toggleCustomOutPurpose(val) {
            const wrapper = document.getElementById('custom-out-purpose-wrapper');
            wrapper.style.display = val === 'Other' ? 'flex' : 'none';
            if(val === 'Other') document.getElementById('out-custom-purpose').focus();
        }

        function initCashFlowCore() {
            if(!localStorage.getItem('cash_on_hand')) localStorage.setItem('cash_on_hand', '5200000');
            if(!localStorage.getItem('cash_history_log')) localStorage.setItem('cash_history_log', JSON.stringify([]));
            
            const banks = JSON.parse(localStorage.getItem('factory_banks')) || [];
            const blSelect = document.getElementById('bl-bank-select');
            if(blSelect) {
                blSelect.innerHTML = banks.length > 0 ? banks.map(b => `<option value="${b.name}">${b.name}</option>`).join('') : '<option value="">No Active Bank Registered</option>';
            }
            refreshCashDashboard();
        }

        function refreshCashDashboard() {
            let cashVal = parseFloat(localStorage.getItem('cash_on_hand')) || 0;
            document.getElementById('val-cash-vault').innerText = '₹ ' + cashVal.toLocaleString('en-IN');

            let history = JSON.parse(localStorage.getItem('cash_history_log')) || [];
            
            let totalIn = history.filter(h => h.type === 'jama' || h.type === 'B2C').reduce((sum, h) => sum + h.amount, 0);
            let totalOut = history.filter(h => h.type === 'javak' || h.type === 'C2B').reduce((sum, h) => sum + h.amount, 0);

            document.getElementById('val-cash-in').innerText = '₹ ' + totalIn.toLocaleString('en-IN');
            document.getElementById('val-cash-out').innerText = '₹ ' + totalOut.toLocaleString('en-IN');

            let tbody = document.getElementById('ledger-rows');
            tbody.innerHTML = '';

            let searchParty = document.getElementById('search-party').value.toLowerCase().trim();
            let searchDate = document.getElementById('search-date').value; 
            if (searchDate) {
                let parts = searchDate.split('-');
                searchDate = `${parts[2]}/${parts[1]}/${parts[0]}`;
            }

            let filteredHistory = history.filter(item => {
                let matchParty = !searchParty || item.party.toLowerCase().includes(searchParty);
                let matchDate = !searchDate || item.date === searchDate;
                return matchParty && matchDate;
            });

            if(filteredHistory.length === 0) {
                tbody.innerHTML = `<tr><td colspan="3" style="text-align:center; color:var(--text-muted); padding:20px;">No operational cash records found.</td></tr>`;
                return;
            }

            [...filteredHistory].reverse().forEach(item => {
                let isCredit = (item.type === 'jama' || item.type === 'B2C');
                let colorClass = isCredit ? 'tx-cr' : 'tx-dr';
                let sign = isCredit ? '+' : '-';
                if(item.type === 'B2C' || item.type === 'C2B') colorClass = 'tx-tr';

                tbody.innerHTML += `
                    <tr>
                        <td style="color:var(--text-muted); font-size:12px;">${item.date}</td>
                        <td><strong>${item.party}</strong><br><small style="color:var(--text-muted);">${item.purpose}</small></td>
                        <td class="${colorClass}">${sign} ₹ ${item.amount.toLocaleString('en-IN')}</td>
                    </tr>
                `;
            });
        }

        function executeCashTransaction(type) {
            let amount = 0, party = '', purpose = '', customPurposeId = '', modalId = '';

            if(type === 'jama') {
                amount = parseFloat(document.getElementById('in-amount').value) || 0;
                party = document.getElementById('in-party').value.trim();
                purpose = document.getElementById('in-purpose').value;
                customPurposeId = 'in-custom-purpose';
                modalId = 'cash-in-modal';
            } else {
                amount = parseFloat(document.getElementById('out-amount').value) || 0;
                party = document.getElementById('out-party').value.trim();
                purpose = document.getElementById('out-purpose').value;
                customPurposeId = 'out-custom-purpose';
                modalId = 'cash-out-modal';
            }

            if(purpose === 'Other') {
                let customVal = document.getElementById(customPurposeId).value.trim();
                if(!customVal) { alert("Please enter custom purpose specification."); return; }
                purpose = customVal;
            }

            if(amount <= 0 || !party) { alert("Please fill complete details."); return; }

            let currentCash = parseFloat(localStorage.getItem('cash_on_hand')) || 0;

            if(type === 'javak' && amount > currentCash) {
                if(!confirm("Warning: Amount exceeds cash vault threshold. Proceed anyway?")) return;
            }

            if(type === 'jama') currentCash += amount;
            else currentCash -= amount;

            let today = new Date();
            let dateStr = today.getDate().toString().padStart(2, '0') + '/' + 
                          (today.getMonth() + 1).toString().padStart(2, '0') + '/' + 
                          today.getFullYear();

            let history = JSON.parse(localStorage.getItem('cash_history_log')) || [];
            history.push({ date: dateStr, party: party, purpose: purpose, amount: amount, type: type, timestamp: new Date().toISOString() });

            localStorage.setItem('cash_on_hand', currentCash.toString());
            localStorage.setItem('cash_history_log', JSON.stringify(history));

            if(type === 'jama') {
                document.getElementById('in-amount').value = '';
                document.getElementById('in-party').value = '';
                document.getElementById('in-custom-purpose').value = '';
                document.getElementById('in-purpose').value = 'Brokerage Income';
            } else {
                document.getElementById('out-amount').value = '';
                document.getElementById('out-party').value = '';
                document.getElementById('out-custom-purpose').value = '';
                document.getElementById('out-purpose').value = 'Factory Wages';
            }

            hidePopupDirect(modalId);
            refreshCashDashboard();
            systemDataBus.postMessage({ type: "PRODUCTION_DATA_MUTATION", module: "cash_flow" });
        }

        function executeBankLinkTransaction() {
            const direction = document.getElementById('bl-direction').value;
            const bankName = document.getElementById('bl-bank-select').value;
            const amount = parseFloat(document.getElementById('bl-amount').value) || 0;
            const method = document.getElementById('bl-method').value;

            if(!bankName || amount <= 0) { alert("Please fill complete Bank Link parameters."); return; }

            let banks = JSON.parse(localStorage.getItem('factory_banks')) || [];
            let bankIdx = banks.findIndex(b => b.name === bankName);
            if(bankIdx === -1) { alert("Target Bank Entity not found."); return; }

            let currentCash = parseFloat(localStorage.getItem('cash_on_hand')) || 0;

            if(direction === 'B2C') {
                banks[bankIdx].balance -= amount;
                currentCash += amount;
            } else { 
                if(amount > currentCash) { alert("Vault Check Rejected: Insufficient Office Cash on hand."); return; }
                banks[bankIdx].balance += amount;
                currentCash -= amount;
            }

            let today = new Date();
            let dateStr = today.getDate().toString().padStart(2, '0') + '/' + 
                          (today.getMonth() + 1).toString().padStart(2, '0') + '/' + 
                          today.getFullYear();

            let cashHistory = JSON.parse(localStorage.getItem('cash_history_log')) || [];
            cashHistory.push({
                date: dateStr,
                party: direction === 'B2C' ? `From ${bankName}` : `To ${bankName}`,
                purpose: direction === 'B2C' ? `BANK_WITHDRAWAL (${method})` : `BANK_DEPOSIT (${method})`,
                amount: amount,
                type: direction,
                timestamp: new Date().toISOString()
            });

            let bankLedger = JSON.parse(localStorage.getItem('bank_ledger_logs')) || [];
            bankLedger.unshift({
                bank: bankName,
                method: method,
                purpose: direction === 'B2C' ? 'CASH_WITHDRAWAL' : 'CASH_DEPOSIT',
                party: 'Office Cash Counter',
                amount: amount,
                mode: direction === 'B2C' ? 'DEBIT' : 'CREDIT',
                timestamp: new Date().toISOString()
            });

            localStorage.setItem('cash_on_hand', currentCash.toString());
            localStorage.setItem('cash_history_log', JSON.stringify(cashHistory));
            localStorage.setItem('factory_banks', JSON.stringify(banks));
            localStorage.setItem('bank_ledger_logs', JSON.stringify(bankLedger));

            document.getElementById('bl-amount').value = '';
            hidePopupDirect('bank-link-modal');
            refreshCashDashboard();
            
            systemDataBus.postMessage({ type: "PRODUCTION_DATA_MUTATION", module: "cash_flow" });
            alert(`⚡ Bank Link Wire Executed: Synchronized with ${bankName} ledger.`);
        }

        function exportLedgerToCSV() {
            let history = JSON.parse(localStorage.getItem('cash_history_log')) || [];
            if(history.length === 0) { alert("No existing cash log records to export."); return; }

            let csvRows = ['Timestamp,Operational Details,Flow Direction,Amount (INR)'];
            history.forEach(h => {
                let dir = (h.type === 'jama' || h.type === 'B2C') ? 'CREDIT (+)' : 'DEBIT (-)';
                csvRows.push(`"${h.date}","${h.party} - ${h.purpose}","${dir}","${h.amount}"`);
            });

            let blob = new Blob([csvRows.join('\n')], { type: 'text/csv;charset=utf-8;' });
            let link = document.createElement("a");
            let url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            link.setAttribute("download", `Raghuveer_CashFlow_Report.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
