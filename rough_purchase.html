<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Raghuveer Diamond - Advanced Procurement Core</title>
    <style>
        :root {
            --bg-primary: #070B19; 
            --bg-secondary: #0D1630; 
            --top-bar-bg: #030611; 
            --border-color: #1C2541; 
            --accent-cyan: #5BC0BE; 
            --accent-blue: #00C6FF; 
            --accent-green: #27AE60; 
            --accent-red: #E74C3C; 
            --accent-purple: #9B59B6;
            --text-main: #FFFFFF; 
            --text-muted: #708090; 
        }

        /* PERMANENT NO SCROLLBAR POLICY */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; }
        body { background-color: var(--bg-primary); color: var(--text-main); width: 100vw; height: 100vh; display: flex; flex-direction: column; overflow: hidden !important; }
        ::-webkit-scrollbar { display: none !important; width: 0px !important; }

        /* Top Windows Control Architecture */
        .window-control-bar { height: 45px; background-color: var(--top-bar-bg); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; border-bottom: 2px solid var(--border-color); flex-shrink: 0; } 
        .brand-title { font-size: 14px; font-weight: 900; letter-spacing: 1px; color: var(--accent-cyan); text-transform: uppercase; } 
        .control-group { display: flex; gap: 8px; }
        .btn-win { width: 32px; height: 26px; border: none; border-radius: 4px; color: white; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; font-size: 14px; text-decoration: none; }
        .btn-min { background: #2C3E50; }
        .btn-max { background: #34495E; }
        .btn-close { background: var(--accent-red); }

        /* Workspace Splitter */
        .workspace-grid { flex: 1; display: flex; flex-direction: row; gap: 15px; padding: 15px; overflow: hidden !important; justify-content: center; align-items: stretch; }
        .panel-box { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px 20px 15px 20px; display: flex; flex-direction: column; box-shadow: 0 4px 15px rgba(0,0,0,0.4); height: 100%; overflow: hidden !important; }
        
        .form-panel { flex: 1; max-width: 950px; }
        .log-panel { flex: 0 0 400px; max-width: 400px; }

        /* Dynamic Full-Height Flex Matrix */
        .form-container-grid { display: flex; flex-direction: column; height: 100%; justify-content: space-between; gap: 0; }
        
        /* Layout Row Definitions */
        .form-row-full { flex: 1; display: grid; grid-template-columns: 1fr; padding-bottom: 10px; align-items: stretch; }
        .form-row-2 { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding-bottom: 10px; align-items: stretch; }
        .form-row-3 { flex: 1; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; padding-bottom: 10px; align-items: stretch; }

        .input-group { display: flex; flex-direction: column; justify-content: space-between; height: 100%; min-height: 0; }
        .input-group label { font-size: calc(10px + 0.15vh); color: var(--text-muted); text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px; margin-bottom: 4px; display: block; }
        .input-control { background: #070B19; border: 1px solid var(--border-color); color: var(--accent-cyan); padding: 10px; border-radius: 6px; font-size: calc(12px + 0.2vh); font-weight: bold; outline: none; width: 100%; flex: 1; display: flex; align-items: center; min-height: 0; }
        .input-control:focus { border-color: var(--accent-blue); }
        
        .input-row { display: flex; gap: 6px; flex: 1; min-height: 0; }
        .plus-btn { background: #16213E; color: var(--accent-cyan); border: 1px solid var(--border-color); width: 42px; cursor: pointer; border-radius: 6px; font-weight: bold; font-size: 18px; display: flex; align-items: center; justify-content: center; }
        .plus-btn:hover { background: var(--accent-cyan); color: #030611; }

        .file-label { background: #16213E; color: white; border: 1px dashed var(--accent-cyan); border-radius: 6px; text-align: center; cursor: pointer; font-size: calc(11px + 0.1vh); font-weight: bold; text-transform: uppercase; display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; flex: 1; }
        .file-label:hover { background: rgba(91, 192, 190, 0.1); }

        /* ADVANCED ROUND SWITCH ARCHITECTURE */
        .switch-container { display: flex; align-items: center; gap: 12px; background: #070B19; padding: 5px 15px; border-radius: 30px; border: 1px solid var(--border-color); justify-content: space-between; width: 100%; height: 100%; }
        .switch-label { font-size: calc(11px + 0.1vh); font-weight: 800; color: var(--accent-cyan); text-transform: uppercase; letter-spacing: 0.5px; }
        .round-toggle-switch { position: relative; display: inline-block; width: 56px; height: 30px; flex-shrink: 0; }
        .round-toggle-switch input { opacity: 0; width: 0; height: 0; }
        .slider-round { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #16213E; transition: .3s; border-radius: 34px; border: 1px solid var(--border-color); }
        .slider-round:before { position: absolute; content: ""; height: 22px; width: 22px; left: 3px; bottom: 3px; background-color: var(--text-muted); transition: .3s; border-radius: 50%; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        input:checked + .slider-round { background-color: rgba(0, 198, 255, 0.2); border-color: var(--accent-blue); }
        input:checked + .slider-round:before { transform: translateX(26px); background-color: var(--accent-blue); box-shadow: 0 0 10px var(--accent-blue); }

        .hidden { display: none !important; }
        .invisible { visibility: hidden !important; }

        /* Action Buttons Grid */
        .form-button-matrix { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-top: 15px; flex-shrink: 0; }
        .matrix-btn { background: #16213E; color: #FFF; padding: 14px 10px; font-size: calc(11px + 0.1vh); border-radius: 6px; border: 1px solid var(--accent-cyan); cursor: pointer; font-weight: 800; text-transform: uppercase; transition: all 0.2s ease; letter-spacing: 0.5px; text-align: center; }
        .matrix-btn:hover { border-color: var(--accent-blue); background: #1A2F56; color: var(--accent-cyan); }
        .matrix-btn-export { background: var(--accent-green); color: white; border: 1px solid var(--accent-green); }
        .matrix-btn-export:hover { background: #219653; color: white; }

        /* Table Architecture */
        .filter-control-row { display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px; flex-shrink: 0; }
        .filter-search-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .filter-input { background: #070B19; border: 1px solid var(--border-color); color: var(--accent-cyan); padding: 8px 12px; border-radius: 6px; font-size: 12px; outline: none; font-weight: bold; width: 100%; }
        .table-wrapper { flex: 1; overflow-y: auto !important; border: 1px solid var(--border-color); border-radius: 6px; background: #070B19; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: #16213E; color: var(--accent-cyan); padding: 12px 8px; text-transform: uppercase; font-size: 11px; font-weight: 700; text-align: left; position: sticky; top: 0; z-index: 10; border-bottom: 2px solid var(--border-color); }
        td { padding: 12px 8px; border-bottom: 1px solid var(--border-color); color: #FFFFFF; vertical-align: middle; }
        .tr-row:hover { background: rgba(28, 37, 65, 0.3); }

        .alert-safe { color: #2ECC71; font-weight: bold; font-size: 11px; }
        .alert-warning { color: #F39C12; font-weight: bold; font-size: 11px; }
        .alert-danger { color: #E74C3C; font-weight: bold; font-size: 11px; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(3, 6, 17, 0.9); display: flex; align-items: center; justify-content: center; z-index: 2000; display: none; }
        .modal-box { background: #0B132B; border: 1px solid var(--accent-cyan); border-radius: 12px; padding: 15px; max-width: 90%; max-height: 90%; display: flex; flex-direction: column; align-items: center; }
        .modal-box img { max-width: 100%; max-height: 70vh; object-fit: contain; border-radius: 6px; margin-bottom: 10px; }

        /* AI Cargo Tracker Telemetry Widget */
        .ai-cargo-tracker-widget {
            background: rgba(11, 29, 55, 0.5);
            border: 1px solid rgba(91, 192, 190, 0.3);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 11px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 5px;
            flex-shrink: 0;
        }
        .tracker-pulse-dot {
            width: 8px; height: 8px;
            background: var(--accent-cyan);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--accent-cyan);
            animation: pulseGlow 1.5s infinite;
        }
        @keyframes pulseGlow {
            0% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.15); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.8; }
        }
    </style> 
</head>
<body onload="initPurchaseCore()">

    <!-- Control Header -->
    <div class="window-control-bar"> 
        <div class="brand-title">RAGHUVEER DIAMOND - ROUGH INTAKE PROCUREMENT CORE</div> 
        <div class="control-group">
            <button class="btn-win btn-min" onclick="alert('Terminal Minimized')">-</button>
            <button class="btn-win btn-max" onclick="toggleFullScreen()">□</button>
            <a href="main_office.html" class="btn-win btn-close">✕</a>
        </div>
    </div>

    <!-- Workspace Structure -->
    <div class="workspace-grid">
        
        <!-- Left Core Panel -->
        <div class="panel-box form-panel">
            <div class="form-container-grid">
                
                <!-- ROW 0: INWARD PATHWAY & VENDOR MASTER -->
                <div class="form-row-2">
                    <div class="input-group">
                        <label>Procurement Pathway</label>
                        <select id="inward-pathway" class="input-control" onchange="toggleInwardPathway(this.value)">
                            <option value="local">Local Market Purchase (GST)</option>
                            <option value="import">International Import (Customs & Freight)</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Vendor Entity Target</label>
                        <div class="input-row">
                            <select id="vendor" class="input-control"><option value="">-- Select Vendor Entity --</option></select>
                            <button class="plus-btn" onclick="addNewVendorEntity()">+</button>
                        </div>
                    </div>
                </div>

                <!-- ROW 1: DATE & LOT NO -->
                <div class="form-row-2">
                    <div class="input-group"><label>Intake Date</label><input type="date" id="date" class="input-control"></div>
                    <div class="input-group"><label>Lot No</label><input type="text" id="lot" class="input-control" placeholder="e.g. RF-101"></div>
                </div>

                <!-- ROW 2: WEIGHT & PRICE -->
                <div class="form-row-2">
                    <div class="input-group"><label>Weight (Carats)</label><input type="number" step="0.01" id="weight" class="input-control" placeholder="0.00" oninput="calculateLandedCosts()"></div>
                    <div class="input-group"><label>Price / Carat (₹/$) </label><input type="number" step="0.01" id="price" class="input-control" placeholder="0.00" oninput="calculateLandedCosts()"></div>
                </div>

                <!-- ROW 3: PURCHASE STREAM & CONDITIONAL INTERMEDIATE BROKER -->
                <div class="form-row-2">
                    <div class="input-group">
                        <label>Purchase Stream</label>
                        <select id="stream" class="input-control" onchange="toggleBrokerBlock()">
                            <option value="direct">Direct Account</option>
                            <option value="broker">Via Broker / Intermediary</option>
                        </select>
                    </div>
                    
                    <div id="broker-target-group" class="input-group hidden">
                        <label>Broker Target</label>
                        <div class="input-row">
                            <select id="broker" class="input-control"><option value="">-- Select Broker --</option></select>
                            <button class="plus-btn" onclick="addNewBrokerEntity()">+</button>
                        </div>
                    </div>
                    <div id="broker-placeholder-row" class="input-group"></div>
                </div>

                <!-- ROW 4: TAX / IMPORT DUTY SYSTEM CONTROLS -->
                <div class="form-row-3">
                    <!-- Local Tax Field (Visible only when Local selected) -->
                    <div class="input-group" id="group-local-tax">
                        <label>Local GST Structure</label>
                        <select id="tax-local" class="input-control" onchange="calculateLandedCosts()">
                            <option value="0.25">GST Rough Intake (0.25%)</option>
                            <option value="1.5">GST Inward Standard (1.5%)</option>
                            <option value="0">Exempted / Nil (0%)</option>
                        </select>
                    </div>

                    <!-- Import Fields (Visible only when Import selected) -->
                    <div class="input-group hidden" id="group-import-duty">
                        <label>Customs Duty (%)</label>
                        <input type="number" step="0.01" id="tax-import-duty" class="input-control" value="2.5" oninput="calculateLandedCosts()">
                    </div>
                    <div class="input-group hidden" id="group-import-freight">
                        <label>Freight & Insurance (₹)</label>
                        <input type="number" step="1" id="import-freight" class="input-control" value="0" placeholder="0.00" oninput="calculateLandedCosts()">
                    </div>
                    <div class="input-group hidden" id="group-import-clearing">
                        <label>Clearing Agent Fees (₹)</label>
                        <input type="number" step="1" id="import-clearing" class="input-control" value="0" placeholder="0.00" oninput="calculateLandedCosts()">
                    </div>

                    <!-- Brokerage PCT (Visible only when stream === broker) -->
                    <div id="broker-pct-group" class="input-group hidden">
                        <label>Brokerage (%)</label>
                        <input type="number" step="0.01" id="broker-pct" class="input-control" placeholder="0.00" oninput="calculateLandedCosts()">
                    </div>
                    <div id="broker-pct-placeholder" class="input-group"></div>
                </div>

                <!-- ROW 5: LANDED COSTS & PAYMENT MODE SOURCE -->
                <div class="form-row-2">
                    <div class="input-group">
                        <label style="color: var(--accent-blue); font-weight: bold;">Total Landed Cost per Carat (₹)</label>
                        <input type="text" id="net-landed-carat" class="input-control" readonly style="color: var(--accent-blue); background: #030611; border-color: var(--accent-blue);" placeholder="0.00">
                    </div>
                    <div class="input-group">
                        <label style="color: var(--accent-green); font-weight: bold;">Net Payable Valuation (₹)</label>
                        <input type="text" id="net-payable" class="input-control" readonly style="color: var(--accent-green); background: #030611; border-color: var(--accent-green);" placeholder="0.00">
                    </div>
                </div>

                <!-- ROW 6: PAYMENT MODE SOURCE & DUE TARGET DATE -->
                <div class="form-row-2">
                    <div class="input-group"><label>Payment Mode Source</label>
                        <select id="pay-source" class="input-control">
                            <option value="BANK">CONNECTED BANK CHANNEL (DIRECT DEBIT)</option>
                            <option value="CASH">OFFICE CASH COUNTER (LOCAL FLOW)</option>
                        </select>
                    </div>
                    <div class="input-group"><label>Due Target Date</label><input type="date" id="due-date" class="input-control"></div>
                </div>

                <!-- ROW 7: IMAGE BILL MEDIA & SMALL ROUND TOGGLE COMMIT -->
                <div class="form-row-2">
                    <div class="input-group">
                        <label>Invoice Verification Media</label>
                        <label for="bill-photo" class="file-label" id="file-label-text">📷 Capture / Upload Bill</label>
                        <input type="file" id="bill-photo" accept="image/*" class="hidden" onchange="processBillImage(this)">
                    </div>
                    <div class="input-group">
                        <label>Commit Operational Control</label>
                        <div class="switch-container">
                            <span class="switch-label" id="switch-text-state">Slide to Commit</span>
                            <label class="round-toggle-switch">
                                <input type="checkbox" id="commit-toggle" onchange="handleSwitchCommit(this)">
                                <span class="slider-round"></span>
                            </label>
                        </div>
                    </div>
                </div>

                <!-- Bottom 2x2 Operations Matrix Box Locked 15px From Bottom -->
                <div class="form-button-matrix">
                    <button class="matrix-btn" onclick="triggerAiVoice()">🎤 VOICE</button>
                    <button class="matrix-btn" onclick="triggerAiScan()">📸 SCAN</button>
                    <button class="matrix-btn" onclick="triggerAiYield()">📈 YIELD</button>
                    <button class="matrix-btn matrix-btn-export" onclick="exportPurchaseLedgerToCSV()">📥 EXPORT SHEET</button>
                </div>
            </div>
        </div>

        <!-- Right Side Database Panel -->
        <div class="panel-box log-panel">
            <div class="filter-control-row">
                <div class="filter-search-group">
                    <input type="text" class="filter-input" id="search-party" placeholder="Search Vendor..." oninput="refreshPurchaseHistoryTable()">
                    <input type="date" class="filter-input" id="search-date" onchange="refreshPurchaseHistoryTable()">
                </div>
                
                <!-- AI Unmanned Cargo Tracking Widget -->
                <div class="ai-cargo-tracker-widget">
                    <span style="display:flex; align-items:center; gap:6px;">
                        <span class="tracker-pulse-dot"></span>
                        <strong>Global Cargo Telemetry:</strong>
                    </span>
                    <span id="txt-cargo-telemetry" style="color:var(--accent-cyan); font-weight:bold;">Local Sourcing Active</span>
                </div>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Lot No</th>
                            <th>Date / Status</th>
                            <th>Vendor Details</th>
                            <th>Landed (₹)</th>
                        </tr>
                    </thead>
                    <tbody id="purchase-history-rows"></tbody>
                </table>
            </div>
        </div>

    </div>

    <!-- Lightbox -->
    <div class="modal-overlay" id="image-modal" onclick="closeImageModal()">
        <div class="modal-box" onclick="event.stopPropagation()">
            <img id="modal-img-src" src="" alt="Bill Preview">
            <button class="matrix-btn" style="width:100px; border-color:var(--accent-red); color:white; background:var(--accent-red);" onclick="closeImageModal()">Close</button>
        </div>
    </div>

    <script>
        const systemDataBus = new BroadcastChannel('raghuveer_ai_core_bus');
        const dbName = "RaghuveerDiamondDB";
        const dbVersion = 2; // Upgraded for seamless IndexedDB integrations
        let dbInstance = null;
        let attachedImageBase64 = "";

        // ========================================================
        // 📡 CENTRALIZED INDEXEDDB ASYNC LAYER SETUP
        // ========================================================
        function initPurchaseCore() {
            document.getElementById('date').valueAsDate = new Date();
            
            const request = indexedDB.open(dbName, dbVersion);
            request.onsuccess = (event) => {
                dbInstance = event.target.result;
                console.log("🧬 [PURCHASE CORE DB] Linked to central database.");
                seedDefaultVendorsAndBrokers();
                refreshPurchaseHistoryTable();
            };
        }

        function seedDefaultVendorsAndBrokers() {
            readAllFromStore("broker_store", (vendors) => {
                if(vendors.length === 0) {
                    // Seed standard accounts receivable/payable directories
                    writeToStore("broker_store", { id: "vend_surat_llp", name: "Surat Local Raw LLP", type: "Vendor", country: "India" });
                    writeToStore("broker_store", { id: "vend_gorg_dubai", name: "Gorg Diamonds NV", type: "Vendor", country: "UAE" });
                    writeToStore("broker_store", { id: "vend_antwerp_raw", name: "Antwerp Raw NV", type: "Vendor", country: "Belgium" });
                    writeToStore("broker_store", { id: "brok_vimal_surat", name: "Vimal Shah (Surat)", type: "Broker", country: "India" });
                }
                setTimeout(populateDropdowns, 200);
            });
        }

        function writeToStore(storeName, data) {
            if(!dbInstance) return;
            const tx = dbInstance.transaction(storeName, "readwrite");
            const store = tx.objectStore(storeName);
            store.put(data);
        }

        function readAllFromStore(storeName, callback) {
            if(!dbInstance) {
                callback([]);
                return;
            }
            const tx = dbInstance.transaction(storeName, "readonly");
            const store = tx.objectStore(storeName);
            const request = store.getAll();
            request.onsuccess = () => {
                callback(request.result || []);
            };
        }

        // ========================================================
        // ⚖️ HIGH-PRECISION MATHEMATICAL ARITHMETIC (No Float Drift)
        // ========================================================
        function preciseAdd(a, b) { return parseFloat((a + b).toFixed(2)); }
        function preciseMult(a, b) { return parseFloat((a * b).toFixed(2)); }
        function preciseDiv(a, b) { return parseFloat((a / b).toFixed(2)); }

        function populateDropdowns() {
            readAllFromStore("broker_store", (list) => {
                const vendorSelect = document.getElementById('vendor');
                const brokerSelect = document.getElementById('broker');

                vendorSelect.innerHTML = `<option value="">-- Select Vendor Entity --</option>`;
                brokerSelect.innerHTML = `<option value="">-- Select Broker --</option>`;

                list.forEach(item => {
                    if (item.type === "Vendor") {
                        vendorSelect.innerHTML += `<option value="${item.name}">${item.name} (${item.country})</option>`;
                    } else if (item.type === "Broker") {
                        brokerSelect.innerHTML += `<option value="${item.name}">${item.name}</option>`;
                    }
                });
            });
        }

        function toggleInwardPathway(type) {
            const groupLocal = document.getElementById('group-local-tax');
            const groupImportDuty = document.getElementById('group-import-duty');
            const groupImportFreight = document.getElementById('group-import-freight');
            const groupImportClearing = document.getElementById('group-import-clearing');
            const cargoText = document.getElementById('txt-cargo-telemetry');

            if (type === "import") {
                groupLocal.classList.add('hidden');
                groupImportDuty.classList.remove('hidden');
                groupImportFreight.classList.remove('hidden');
                groupImportClearing.classList.remove('hidden');
                cargoText.innerText = "Transit: Antwerp ➔ Surat Customs [Cleared]";
            } else {
                groupLocal.classList.remove('hidden');
                groupImportDuty.classList.add('hidden');
                groupImportFreight.classList.add('hidden');
                groupImportClearing.classList.add('hidden');
                cargoText.innerText = "Local Sourcing Active";
            }
            calculateLandedCosts();
        }

        function toggleBrokerBlock() {
            let stream = document.getElementById('stream').value;
            let targetGroup = document.getElementById('broker-target-group');
            let placeholderRow = document.getElementById('broker-placeholder-row');
            let pctGroup = document.getElementById('broker-pct-group');
            let pctPlaceholder = document.getElementById('broker-pct-placeholder');

            if (stream === 'broker') {
                targetGroup.classList.remove('hidden');
                placeholderRow.classList.add('hidden');
                pctGroup.classList.remove('hidden');
                pctPlaceholder.classList.add('hidden');
            } else {
                targetGroup.classList.add('hidden');
                placeholderRow.classList.remove('hidden');
                pctGroup.classList.add('hidden');
                pctPlaceholder.classList.remove('hidden');
                document.getElementById('broker-pct').value = '';
                calculateLandedCosts();
            }
        }

        function calculateLandedCosts() {
            let weight = parseFloat(document.getElementById('weight').value) || 0;
            let price = parseFloat(document.getElementById('price').value) || 0;
            let baseAmount = preciseMult(weight, price);

            let brokerage = 0;
            if (document.getElementById('stream').value === 'broker') {
                let bPct = parseFloat(document.getElementById('broker-pct').value) || 0;
                brokerage = preciseDiv(preciseMult(baseAmount, bPct), 100);
            }

            let taxAndDuties = 0;
            let pathway = document.getElementById('inward-pathway').value;

            if (pathway === "local") {
                let tPct = parseFloat(document.getElementById('tax-local').value) || 0;
                taxAndDuties = preciseDiv(preciseMult(baseAmount, tPct), 100);
            } else {
                let dutyPct = parseFloat(document.getElementById('tax-import-duty').value) || 0;
                let freight = parseFloat(document.getElementById('import-freight').value) || 0;
                let clearing = parseFloat(document.getElementById('import-clearing').value) || 0;
                
                let baseDuty = preciseDiv(preciseMult(baseAmount, dutyPct), 100);
                taxAndDuties = preciseAdd(preciseAdd(baseDuty, freight), clearing);
            }

            let finalNetPayable = preciseAdd(preciseAdd(baseAmount, brokerage), taxAndDuties);
            let landedCostPerCarat = weight > 0 ? preciseDiv(finalNetPayable, weight) : 0;

            document.getElementById('net-payable').value = finalNetPayable.toFixed(2);
            document.getElementById('net-landed-carat').value = landedCostPerCarat.toFixed(2);

            return { finalNetPayable, landedCostPerCarat };
        }

        function handleSwitchCommit(toggle) {
            if (toggle.checked) {
                document.getElementById('switch-text-state').innerText = "Processing...";
                setTimeout(() => {
                    savePurchaseRecord();
                    toggle.checked = false; 
                    document.getElementById('switch-text-state').innerText = "Slide to Commit";
                }, 400);
            }
        }

        function processBillImage(input) {
            if (input.files && input.files[0]) {
                let reader = new FileReader();
                reader.onload = function(e) {
                    attachedImageBase64 = e.target.result;
                    document.getElementById('file-label-text').innerText = "✅ Bill Attached";
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function viewAttachedBill(index) {
            readAllFromStore("rough_store", (logs) => {
                if(logs[index] && logs[index].billImage) {
                    document.getElementById('modal-img-src').src = logs[index].billImage;
                    document.getElementById('image-modal').style.display = 'flex';
                } else {
                    alert("No bill photo attached to this specific lot.");
                }
            });
        }

        function closeImageModal() {
            document.getElementById('image-modal').style.display = 'none';
        }

        function addNewVendorEntity() {
            let val = prompt("Enter New Vendor Entity Name:");
            let country = prompt("Enter Country / Region (e.g. India, Dubai, Belgium):") || "India";
            if(val && val.trim() !== "") {
                const id = "vend_" + val.trim().toLowerCase().replace(/\s+/g, '_');
                writeToStore("broker_store", { id, name: val.trim(), type: "Vendor", country });
                setTimeout(populateDropdowns, 200);
            }
        }

        function addNewBrokerEntity() {
            let val = prompt("Enter Broker Name:");
            if(val && val.trim() !== "") {
                const id = "brok_" + val.trim().toLowerCase().replace(/\s+/g, '_');
                writeToStore("broker_store", { id, name: val.trim(), type: "Broker", country: "India" });
                setTimeout(populateDropdowns, 200);
            }
        }

        function refreshPurchaseHistoryTable() {
            readAllFromStore("rough_store", (logs) => {
                let tbody = document.getElementById('purchase-history-rows');
                tbody.innerHTML = '';

                let searchParty = document.getElementById('search-party').value.toLowerCase().trim();
                let searchDate = document.getElementById('search-date').value; 
                if (searchDate) {
                    let parts = searchDate.split('-');
                    searchDate = `${parts[2]}/${parts[1]}/${parts[0]}`; 
                }

                let filteredLogs = logs.filter(item => {
                    let matchParty = !searchParty || item.vendor.toLowerCase().includes(searchParty);
                    let matchDate = !searchDate || item.date === searchDate;
                    return matchParty && matchDate;
                });

                if(filteredLogs.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:var(--text-muted); padding:30px;">Empty Logs</td></tr>`;
                    return;
                }

                filteredLogs.reverse().forEach((log, index) => {
                    let dueStatusHtml = `<br><span class="alert-safe">Paid Source</span>`;
                    
                    if(log.dueDate) {
                        let today = new Date();
                        today.setHours(0,0,0,0);
                        let parts = log.dueDate.split('/');
                        let dueObj = new Date(parts[2], parts[1]-1, parts[0]);
                        
                        let diffTime = dueObj - today;
                        let diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

                        if(diffDays > 0) {
                            dueStatusHtml = `<br><span class="alert-warning">⏳ ${diffDays} days left</span>`;
                        } else if(diffDays === 0) {
                            dueStatusHtml = `<br><span class="alert-danger">🚨 Due Today</span>`;
                        } else {
                            dueStatusHtml = `<br><span class="alert-danger">⚠️ Overdue ${Math.abs(diffDays)}d</span>`;
                        }
                    }

                    let cameraIcon = log.billImage ? `<span style="cursor:pointer; margin-left:4px;" onclick="viewAttachedBill(${index})">🖼️</span>` : "";

                    tbody.innerHTML += `
                        <tr class="tr-row">
                            <td style="color:var(--accent-blue); font-weight:bold;">${log.lot_no} ${cameraIcon}</td>
                            <td style="color:var(--text-muted); font-size:11px;">${log.date} ${dueStatusHtml}</td>
                            <td><strong>${log.vendor}</strong><br><small style="color:var(--text-muted); font-size:11px;">${log.weight} Cts</small></td>
                            <td style="color:var(--accent-cyan); font-weight:bold;">₹${Math.round(log.netPayable).toLocaleString('en-IN')}</td>
                        </tr>
                    `;
                });
            });
        }

        function savePurchaseRecord() {
            let lot = document.getElementById('lot').value.trim();
            let dateInput = document.getElementById('date').value;
            let dueDateInput = document.getElementById('due-date').value;
            let vendor = document.getElementById('vendor').value;
            let source = document.getElementById('pay-source').value;
            let carat = parseFloat(document.getElementById('weight').value) || 0;
            let price = parseFloat(document.getElementById('price').value) || 0;
            
            const costData = calculateLandedCosts();
            let netPayable = costData.finalNetPayable;

            if(!lot || !dateInput || !vendor || carat <= 0 || price <= 0) {
                alert("Validation Check Failure: Missing Mandatory parameters!");
                return;
            }

            let dParts = dateInput.split('-');
            let dateStr = `${dParts[2]}/${dParts[1]}/${dParts[0]}`;

            let dueDateStr = "";
            if(dueDateInput) {
                let ddParts = dueDateInput.split('-');
                dueDateStr = `${ddParts[2]}/${ddParts[1]}/${ddParts[0]}`;
            }

            // High Precision DB transaction integration
            if (source === 'CASH') {
                readAllFromStore("cash_flow", (records) => {
                    let cashRec = records[0] || { total_cash: 5200000, today_in: 0, today_out: 0 };
                    if(netPayable > cashRec.total_cash) {
                        if(!confirm("Warning Matrix Check: Payable exceeds cash vault inventory threshold. Proceed?")) return;
                    }
                    cashRec.total_cash = preciseSubtract(cashRec.total_cash, netPayable);
                    cashRec.today_out = preciseAdd(cashRec.today_out, netPayable);
                    writeToStore("cash_flow", cashRec);
                });
            } else {
                readAllFromStore("bank_accounts", (banks) => {
                    if(banks.length === 0) {
                        alert("Sync Aborted: Connect your bank accounts inside Bank Vault first.");
                        return;
                    }
                    // Subtract from the primary linked bank account
                    const primaryBank = banks[0];
                    primaryBank.balance = preciseSubtract(primaryBank.balance, netPayable);
                    writeToStore("bank_accounts", primaryBank);

                    const txId = "TX-RD-" + Math.random().toString(36).substring(2, 9).toUpperCase();
                    const timestamp = new Date().toISOString();
                    
                    const ledgerEntry = { txId, bank: primaryBank.name, method: 'WIRE_TRANSFER', purpose: `Rough Intake Lot: ${lot}`, party: vendor, amount: netPayable, original_amount: netPayable, original_currency: "INR", mode: 'DEBIT', timestamp };
                    writeToStore("bank_ledger", ledgerEntry);
                });
            }

            // Save the procurement lot to IndexedDB
            const finalLotData = {
                id: lot.toLowerCase(),
                lot_no: lot,
                date: dateStr,
                dueDate: dueDateStr,
                vendor: vendor,
                stream: document.getElementById('stream').value,
                broker: document.getElementById('broker').value,
                weight: carat,
                netPayable: netPayable,
                landedCostPerCarat: costData.landedCostPerCarat,
                billImage: attachedImageBase64
            };

            writeToStore("rough_store", finalLotData);

            // Dispatch global event bus message to update main office counters in 1/100s
            systemDataBus.postMessage({ type: "PRODUCTION_DATA_MUTATION", triggeredBy: "rough_purchase" });

            // Reset inputs
            document.getElementById('lot').value = '';
            document.getElementById('weight').value = '';
            document.getElementById('price').value = '';
            document.getElementById('broker-pct').value = '';
            document.getElementById('due-date').value = '';
            document.getElementById('bill-photo').value = '';
            attachedImageBase64 = "";
            document.getElementById('file-label-text').innerText = "📷 Capture / Upload Bill";
            document.getElementById('net-payable').value = '0.00';
            document.getElementById('net-landed-carat').value = '0.00';
            
            alert(`⚡ System Confirmed: Procurement Lot ${lot} Integrated Successfully!`);
            setTimeout(refreshPurchaseHistoryTable, 200);
        }

        function exportPurchaseLedgerToCSV() {
            readAllFromStore("rough_store", (history) => {
                if(history.length === 0) { alert("Data Empty to export!"); return; }

                let csvRows = ['Lot No,Date,Vendor Details,Weight (Carats),Landed Cost per Carat (INR),Total Amount (INR)'];
                history.forEach(h => {
                    csvRows.push(`"${h.lot_no}","${h.date}","${h.vendor} (${h.stream})","${h.weight}","${h.landedCostPerCarat}","${h.netPayable}"`);
                });

                let blob = new Blob([csvRows.join('\n')], { type: 'text/csv;charset=utf-8;' });
                let link = document.createElement("a");
                let url = URL.createObjectURL(blob);
                link.setAttribute("href", url);
                link.setAttribute("download", `Raghuveer_Purchase_Report.csv`);
                link.style.visibility = 'hidden';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            });
        }

        function triggerAiScan() { alert("RA-AI Invoice Optical Scanner Initializing..."); }
        function triggerAiYield() { alert("RA-AI Diagnostics: Target calculation yields 31.8% VVS polish outcome."); }

        function toggleFullScreen() {
            if (!document.fullscreenElement) { document.documentElement.requestFullscreen().catch(e=>{}); } 
            else { document.exitFullscreen(); }
        }
    </script>
