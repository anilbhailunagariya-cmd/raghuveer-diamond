            <div class="metric-card green-tag" onclick="window.location.href='sales_details.html'" style="cursor: pointer;">
                <div class="card-label">GLOBAL SALES</div>
                <div class="card-value" id="val-sales">₹ 12,68,40,000</div>
                <div class="live-status-indicator"><span class="status-dot"></span></div>
            </div>
            
            <!-- 4. CASH FLOW CARD -->
            <div class="metric-card" onclick="window.location.href='cash_details.html'" style="cursor: pointer;">
                <div class="card-label">CASH FLOW</div>
                <div class="card-value" id="val-cash">₹ 34,12,319</div>
                <div class="live-status-indicator"><span class="status-dot"></span></div>
            </div>
        </div>

        <!-- Universal Cyber Print Station -->
        <div class="workspace-split-grid">
            <div class="print-station-card">
                <div class="block-title" style="border: none;">Universal Cyber Print Station</div>
                
                <div class="print-btn-group">
                    <button class="print-btn" onclick="executeCyberPrint('Letter Pad')">
                        <span>1. Letter Pad Print</span> <span class="print-icon">🖨️</span>
                    </button>
                    <button class="print-btn" onclick="executeCyberPrint('Check')">
                        <span>2. Check Print</span> <span class="print-icon">🏦</span>
                    </button>
                    <button class="print-btn" onclick="executeCyberPrint('Excel')">
                        <span>3. Excel Export & Print</span> <span class="print-icon">📊</span>
                    </button>
                </div>

                <div class="size-setting-box">
                    <div class="card-label" style="font-size: 9px;">4. Universal Size & Layout Settings</div>
                    <div class="size-grid">
                        <button class="size-btn active" id="sz-a4" onclick="setPrinterSize('a4')">A4 Standard</button>
                        <button class="size-btn" id="sz-a5" onclick="setPrinterSize('a5')">A5 Pad</button>
                        <button class="size-btn" id="sz-legal" onclick="setPrinterSize('legal')">Legal Document</button>
                        <button class="size-btn" id="sz-check" onclick="setPrinterSize('check')">Custom Check Size</button>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        let selectedLayoutSize = "a4";

        function goToDashboard() {
            window.location.href = 'dashboard.html'; 
        }

        function triggerFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => { 
                    console.log("Fullscreen request.");
                });
            } else {
                document.exitFullscreen();
            }
        }

        function triggerMinimize() {
            alert("Main Office terminal minimized.");
        }

        function executeCyberPrint(documentType) {
            alert(`PRINTER COMMAND SENT:\nPrinting ${documentType} Matrix using [${selectedLayoutSize.toUpperCase()}] configuration profile.`);
        }

        function setPrinterSize(sizeKey) {
            selectedLayoutSize = sizeKey;
            const sizes = ['a4', 'a5', 'legal', 'check'];
            sizes.forEach(item => {
                document.getElementById(`sz-${item}`).classList.remove('active');
            });
            document.getElementById(`sz-${sizeKey}`).classList.add('active');
        }

        // લોકલ સ્ટોરેજમાંથી લાઈવ ડેટા ખેંચવાનું લોજિક
        function loadDashboardData() {
            // જો લોકલ સ્ટોરેજમાં નવો આંકડો હોય તો એ બતાવો, નહીંતર તમારો ઓરિજિનલ સ્ટેબલ આંકડો ફિક્સ રહેશે
            const totalRough = localStorage.getItem('total_rough') || "8450";
            const usdRate = localStorage.getItem('usd_rate') || "83.72";
            const totalCash = localStorage.getItem('total_cash') || "3412319";
            const globalSales = localStorage.getItem('global_sales') || "126840000";

            document.getElementById('val-rough').innerText = parseInt(totalRough).toLocaleString('en-IN') + " Carats";
            document.getElementById('val-usd').innerText = "₹ " + usdRate;
            document.getElementById('val-cash').innerText = "₹ " + parseInt(totalCash).toLocaleString('en-IN');
            document.getElementById('val-sales').innerText = "₹ " + parseInt(globalSales).toLocaleString('en-IN');
        }

        // પેજ લોડ થાય ત્યારે ડેટા લાઈવ કરો
        loadDashboardData();
        // દર ૨ સેકન્ડે બેકગ્રાઉન્ડ ચેક ચાલુ રાખશે
        setInterval(loadDashboardData, 2000);
    </script>
</body>
</html>
