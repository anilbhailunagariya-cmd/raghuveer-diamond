<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Raghuveer Diamond - Main Office Core</title>
    <style>
        /* Shared Core Cyber Theme Matrix */
        :root {
            --bg-primary: #0B132B;
            --bg-secondary: #111D37;
            --top-bar-bg: #070B19;
            --border-color: #1C2541;
            --accent-cyan: #5BC0BE;
            --accent-blue: #00C6FF;
            --accent-green: #27AE60;
            --accent-red: #E74C3C;
            --text-main: #FFFFFF;
            --text-muted: #708090;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Top Bar & Logo Matrix */
        .window-control-bar {
            height: 50px;
            background-color: var(--top-bar-bg);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 0 0 20px;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .company-logo-frame {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: linear-gradient(45deg, #00C6FF, #0072FF);
            box-shadow: 0 0 8px #00C6FF;
        }

        /* Live Cyber Glow Animation for RAGHUVEER DIAMOND */
        .brand-title {
            font-size: 16px;
            font-weight: 900;
            letter-spacing: 1px;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-blue), #0072FF, var(--accent-cyan));
            background-size: 300% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: cyberGlow 6s linear infinite;
            text-transform: uppercase;
        }

        @keyframes cyberGlow {
            0% { background-position: 0% center; }
            100% { background-position: 300% center; }
        }

        /* Computer Windows Style Small Control Buttons */
        .window-actions {
            display: flex;
            height: 100%;
        }

        .win-btn {
            background: none;
            border: none;
            color: var(--accent-cyan);
            width: 45px;
            height: 100%;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .win-btn:hover {
            background: var(--border-color);
            color: #FFFFFF;
        }

        .win-btn.close-btn:hover {
            background: var(--accent-red);
            color: #FFFFFF;
        }

        /* Core Layout Grid */
        .office-container {
            flex: 1;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
        }

        /* 5 Main Core Cards Row Grid */
        .core-metrics-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 12px;
        }

        .metric-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 15px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: border-color 0.2s;
        }

        .metric-card:hover {
            border-color: var(--accent-cyan);
        }

        .metric-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 4px; height: 100%;
            background: var(--accent-blue);
        }

        .metric-card.green-tag::before { background: var(--accent-green); }

        .card-label {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--accent-cyan);
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .card-value {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .live-status-indicator {
            font-size: 10px;
            color: var(--accent-green);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background-color: var(--accent-green);
            animation: blink 1.5s infinite;
        }

        @keyframes blink { 50% { opacity: 0.3; } }

        /* Universal Cyber Print Station Layout */
        .print-station-card {
            background: linear-gradient(145deg, var(--bg-secondary), #162649);
            border: 1px solid rgba(91, 192, 190, 0.2);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        .print-btn-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 10px;
            margin-bottom: 15px;
        }

        .print-btn {
            background: #0B132B;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 12px 15px;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            font-size: 12px;
            text-transform: uppercase;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.2s;
        }

        .print-btn:hover {
            border-color: var(--accent-cyan);
            background: var(--border-color);
        }

        .print-icon { color: var(--accent-cyan); font-size: 14px; }

        .size-setting-box {
            background: #070B19;
            border: 1px dashed var(--border-color);
            border-radius: 6px;
            padding: 12px;
        }

        .size-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 8px;
            margin-top: 8px;
        }

        .size-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            font-size: 10px;
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .size-btn.active, .size-btn:hover {
            border-color: var(--accent-cyan);
            color: var(--text-main);
            background: #1C2541;
        }

        /* 2050 Director Advanced Configuration Control Panel */
        .director-settings-bar {
            background: #070B19;
            border: 1px solid var(--border-color);
            padding: 15px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .settings-top-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
            justify-content: space-between;
        }

        .config-input-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .cyber-input {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            color: var(--accent-cyan);
            padding: 6px 10px;
            border-radius: 6px;
            outline: none;
            width: 80px;
            font-weight: bold;
            text-align: center;
        }

        .cyber-switch-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 10px;
            width: 100%;
            border-top: 1px dashed var(--border-color);
            padding-top: 12px;
        }

        .cyber-toggle-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
            text-align: center;
            transition: all 0.2s ease;
        }

        .cyber-toggle-btn.active {
            border-color: var(--accent-cyan);
            color: var(--bg-primary);
            background: var(--accent-cyan);
            box-shadow: 0 0 10px var(--accent-cyan);
        }

        .privacy-blur-effect {
            filter: blur(8px);
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- Header Structure -->
    <div class="window-control-bar">
        <div class="brand-wrapper">
            <div class="company-logo-frame"></div>
            <div class="brand-title">RAGHUVEER DIAMOND</div>
        </div>
        
        <div class="window-actions">
            <button class="win-btn" onclick="triggerMinimize()">-</button>
            <button class="win-btn" onclick="triggerFullScreen()">🗖</button>
            <button class="win-btn close-btn" onclick="goToDashboard()">✕</button>
        </div>
    </div>

    <div class="office-container">
        
        <!-- 5 Core Pillars Row -->
        <div class="core-metrics-row">
            <!-- 1. BANK CARD -->
            <div class="metric-card" id="card-bank" onclick="window.location.href='bank_details.html'" style="cursor: pointer;">
                <div class="card-label" id="lbl-bank">BANK</div>
                <div class="card-value" id="val-usd">₹ 83.72</div>
                <div class="live-status-indicator"><span class="status-dot"></span></div>
            </div>
            
            <!-- 2. ROUGH PURCHASE CARD -->
            <div class="metric-card" id="card-rough" onclick="window.location.href='rough_purchase.html'" style="cursor: pointer;">
                <div class="card-label" id="lbl-rough">ROUGH PURCHASE</div>
                <div class="card-value" id="val-rough">0 Carats</div>
                <div class="live-status-indicator"><span class="status-dot"></span></div>
            </div>
            
            <!-- 3. GLOBAL SALES CARD -->
            <div class="metric-card green-tag" id="card-sales" onclick="window.location.href='sales_details.html'" style="cursor: pointer;">
                <div class="card-label" id="lbl-sales">GLOBAL SALES</div>
                <div class="card-value" id="val-sales">₹ 0</div>
                <div class="live-status-indicator"><span class="status-dot"></span></div>
            </div>
            
            <!-- 4. CASH FLOW CARD -->
            <div class="metric-card" id="card-cash" onclick="window.location.href='cash_flow.html'" style="cursor: pointer;">
                <div class="card-label" id="lbl-cash">CASH FLOW</div>
                <div class="card-value" id="val-cash">₹ 0</div>
                <div class="live-status-indicator"><span class="status-dot"></span></div>
            </div>

            <!-- 5. BROKER & PARTY DIRECTORY -->
            <div class="metric-card" id="card-broker" onclick="window.location.href='broker_list.html'" style="cursor: pointer;">
                <div class="card-label" id="lbl-broker">BROKER & PARTY</div>
                <div class="card-value" id="val-broker">Listing...</div>
                <div class="live-status-indicator"><span class="status-dot"></span></div>
            </div>
        </div>

        <!-- Universal Cyber Print Station -->
        <div class="workspace-split-grid">
            <div class="print-station-card">
                <div class="block-title" style="border: none;">Universal Cyber Print Station</div>
                
                <div class="print-btn-group">
                    <button class="print-btn" onclick="executeCyberPrint('Letter Pad')">
                        <span>1. Letter Pad Print</span> <span class="print-icon">𖤖</span>
                    </button>
                    <button class="print-btn" onclick="executeCyberPrint('Check')">
                        <span>2. Check Print</span> <span class="print-icon">🏦</span>
                    </button>
                    <button class="print-btn" onclick="executeCyberPrint('Excel')">
                        <span>3. Excel Export & Print</span> <span class="print-icon">📊</span>
                    </button>
                </div>

                <div class="size-setting-box">
                    <div class="card-label" style="font-size: 9px;">4. Universal Size & Layout Settings</div>
                    <div class="size-grid">
                        <button class="size-btn active" id="sz-a4" onclick="setPrinterSize('a4')">A4 Standard</button>
                        <button class="size-btn" id="sz-a5" onclick="setPrinterSize('a5')">A5 Pad</button>
                        <button class="size-btn" id="sz-legal" onclick="setPrinterSize('legal')">Legal Document</button>
                        <button class="size-btn" id="sz-check" onclick="setPrinterSize('check')">Custom Check Size</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- ⚙️ 2050 Director Advanced Live Configuration Control Panel -->
        <div class="director-settings-bar">
            <div class="settings-top-row">
                <div class="config-input-group">
                    <span style="font-size: 12px; color: var(--accent-cyan); font-weight: 600;">⚙️ AI AUTO-PILOT ROTATION TIME:</span>
                    <input type="number" id="txt-timer" class="cyber-input" value="3" min="1" onchange="updateRotationSpeed()">
                    <span style="font-size: 11px; color: var(--text-muted);">SEC</span>
                </div>
                <div style="font-size: 10px; color: var(--accent-green); font-weight: bold; letter-spacing: 0.5px;" id="txt-sys-status">
                    MATRIX DATA CONTAINER SYNC: ACTIVE (2050 STANDARD)
                </div>
            </div>

            <!-- 2050 Future Live Switches -->
            <div class="cyber-switch-panel">
                <button class="cyber-toggle-btn" id="btn-privacy" onclick="togglePrivacyMode()">🔒 Privacy Mode (Hide)</button>
                <button class="cyber-toggle-btn" id="btn-forecast" onclick="toggleForecastMode()">🧠 AI Forecast Mode</button>
                <button class="cyber-toggle-btn" id="btn-currency" onclick="toggleCurrencyConverter()">💵 Currency: INR</button>
                <button class="cyber-toggle-btn" id="btn-anomaly" onclick="toggleAnomalyDetection()">🚀 Cyber Anomaly Alert</button>
            </div>
        </div>

    </div>

    <script>
        let selectedLayoutSize = "a4";
        
        let bankRotateIdx = 0;
        let salesRotateIdx = 0;
        let cashRotateIdx = 0;
        let brokerRotateIdx = 0;
        let rotationTimer = null;

        let isPrivacyActive = false;
        let isForecastActive = false;
        let isCurrencyUsd = false;
        let isAnomalyActive = false;

        function goToDashboard() {
            window.location.href = 'dashboard.html'; 
        }

        window.addEventListener('click', function initiateOfficeFullScreen() {
            const docEl = document.documentElement;
            if (docEl.requestFullscreen) docEl.requestFullscreen();
            else if (docEl.webkitRequestFullscreen) docEl.webkitRequestFullscreen();
            window.removeEventListener('click', initiateOfficeFullScreen);
        });

        function triggerFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => { console.log(err); });
            } else {
                document.exitFullscreen();
            }
        }

        function triggerMinimize() {
            console.log("Main Office terminal minimized.");
        }

        function executeCyberPrint(documentType) {
            alert(`PRINTER COMMAND SENT:\nPrinting ${documentType} Matrix using [${selectedLayoutSize.toUpperCase()}] configuration profile.`);
        }

        function setPrinterSize(sizeKey) {
            selectedLayoutSize = sizeKey;
            const sizes = ['a4', 'a5', 'legal', 'check'];
            sizes.forEach(item => { document.getElementById(`sz-${item}`).classList.remove('active'); });
            document.getElementById(`sz-${sizeKey}`).classList.add('active');
        }

        function togglePrivacyMode() {
            isPrivacyActive = !isPrivacyActive;
            const btn = document.getElementById('btn-privacy');
            const targetCards = [document.getElementById('card-sales'), document.getElementById('card-cash')];
            
            if(isPrivacyActive) {
                btn.classList.add('active');
                targetCards.forEach(c => c.classList.add('privacy-blur-effect'));
            } else {
                btn.classList.remove('active');
                targetCards.forEach(c => c.classList.remove('privacy-blur-effect'));
            }
        }

        function toggleForecastMode() {
            isForecastActive = !isForecastActive;
            const btn = document.getElementById('btn-forecast');
            if(isForecastActive) {
                btn.classList.add('active');
                document.getElementById('txt-sys-status').innerText = "AI PREDICTIVE FORECASTING MODE: RUNNING";
                document.getElementById('txt-sys-status').style.color = "var(--accent-blue)";
            } else {
                btn.classList.remove('active');
                document.getElementById('txt-sys-status').innerText = "MATRIX DATA CONTAINER SYNC: ACTIVE (2050 STANDARD)";
                document.getElementById('txt-sys-status').style.color = "var(--accent-green)";
            }
            loadDashboardData();
        }

        function toggleCurrencyConverter() {
            isCurrencyUsd = !isCurrencyUsd;
            const btn = document.getElementById('btn-currency');
            if(isCurrencyUsd) {
                btn.classList.add('active');
                btn.innerText = "💵 Currency: USD";
            } else {
                btn.classList.remove('active');
                btn.innerText = "💵 Currency: INR";
            }
            loadDashboardData();
        }

        function toggleAnomalyDetection() {
            isAnomalyActive = !isAnomalyActive;
            const btn = document.getElementById('btn-anomaly');
            if(isAnomalyActive) {
                btn.classList.add('active');
                console.log("Cyber Anomaly Detection Engine Activated.");
            } else {
                btn.classList.remove('active');
            }
        }

        function loadDashboardData() {
            const usdRate = parseFloat(localStorage.getItem('usd_rate')) || 83.72;

            // 1. BANK CARD
            const bankAccounts = JSON.parse(localStorage.getItem('factory_banks')) || [
                { name: "SBI MAIN A/C", rate: usdRate },
                { name: "HDFC SURAT", rate: usdRate }
            ];
            if(bankAccounts.length > 0) {
                let currentBank = bankAccounts[bankRotateIdx % bankAccounts.length];
                document.getElementById('lbl-bank').innerText = `BANK: ${currentBank.name}`;
                document.getElementById('val-usd').innerText = "₹ " + currentBank.rate;
            }
            bankRotateIdx++;

            // 2. ROUGH PURCHASE CARD
            const totalRough = parseFloat(localStorage.getItem('total_rough')) || 0;
            const roughInProcess = parseFloat(localStorage.getItem('rough_in_process')) || 0;
            let netSafeStock = Math.max(0, totalRough - roughInProcess);
            
            if(isForecastActive) {
                netSafeStock = Math.max(0, netSafeStock - 150); 
                document.getElementById('lbl-rough').innerText = "ROUGH IN SAFE (AI EST.)";
            } else {
                document.getElementById('lbl-rough').innerText = "ROUGH PURCHASE";
            }
            document.getElementById('val-rough').innerText = netSafeStock.toLocaleString('en-IN') + " Carats";

            // 3. GLOBAL SALES CARD
            const polishedStock = JSON.parse(localStorage.getItem('polished_safe_stock')) || [
                { quality: "VVS QUALITY", weight: 0 },
                { quality: "VS QUALITY", weight: 0 },
                { quality: "SI QUALITY", weight: 0 },
                { quality: "DM FLAWLESS", weight: 0 },
                { quality: "FLORO STOCK", weight: 0 }
            ];
            if(polishedStock.length > 0) {
                let currentPolished = polishedStock[salesRotateIdx % polishedStock.length];
                document.getElementById('lbl-sales').innerText = `SAFE: ${currentPolished.quality}`;
                document.getElementById('val-sales').innerText = currentPolished.weight.toLocaleString('en-IN') + " Carats";
            }
            salesRotateIdx++;

            // 4. CASH FLOW CARD
            let totalCash = parseFloat(localStorage.getItem('total_cash')) || 0;
            let todayCashIn = parseFloat(localStorage.getItem('today_cash_incoming')) || 0;
            let todayCashOut = parseFloat(localStorage.getItem('today_cash_expense')) || 0;

            if(isCurrencyUsd) {
                totalCash = totalCash / usdRate;
                todayCashIn = todayCashIn / usdRate;
                todayCashOut = todayCashOut / usdRate;
            }

            const curSym = isCurrencyUsd ? "$ " : "₹ ";
            const cashStates = [
                { label: "CURRENT CASH", value: curSym + totalCash.toLocaleString('en-IN', {maximumFractionDigits:2}) },
                { label: "TODAY INCOMING", value: curSym + todayCashIn.toLocaleString('en-IN', {maximumFractionDigits:2}) },
                { label: "TODAY EXPENSE", value: curSym + todayCashOut.toLocaleString('en-IN', {maximumFractionDigits:2}) }
            ];
            let currentCashState = cashStates[cashRotateIdx % cashStates.length];
            document.getElementById('lbl-cash').innerText = currentCashState.label;
            document.getElementById('val-cash').innerText = currentCashState.value;
            cashRotateIdx++;

            // 5. BROKER & PARTY DIRECTORY
            const brokerList = JSON.parse(localStorage.getItem('broker_directory')) || [
                { name: "NO ACTIVE DEAL", status: "STANDBY" }
            ];
            if(brokerList.length > 0) {
                let currentBroker = brokerList[brokerRotateIdx % brokerList.length];
                document.getElementById('lbl-broker').innerText = `BROKER: ${currentBroker.name}`;
                document.getElementById('val-broker').innerText = currentBroker.status;
            }
            brokerRotateIdx++;
        }

        function updateRotationSpeed() {
            let seconds = parseFloat(document.getElementById('txt-timer').value) || 3;
            if(seconds < 1) seconds = 1;
            clearInterval(rotationTimer);
            rotationTimer = setInterval(loadDashboardData, seconds * 1000);
            localStorage.setItem('user_rotation_speed', seconds);
        }

        loadDashboardData();
        let savedSpeed = localStorage.getItem('user_rotation_speed') || 3;
        document.getElementById('txt-timer').value = savedSpeed;
        rotationTimer = setInterval(loadDashboardData, savedSpeed * 1000);
    </script>
</body>
</html>
